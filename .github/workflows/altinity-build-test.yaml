name: Altinity-agent

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    paths:
      - 'src/AI/agents/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and test
    if: ${{ !github.event.pull_request.draft }}
    permissions:
      contents: read
    runs-on: self-hosted-single
    timeout-minutes: 30

    steps:
    - name: Check out code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        persist-credentials: false

    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
      with:
        python-version: '3.12'

    - name: Install dependencies
      working-directory: src/AI/agents
      run: pip install -r requirements.txt -r requirements-dev.txt

    - name: Run Altinity unit tests
      working-directory: src/AI/agents
      run: python -m pytest

    - name: Start Altinity server
      working-directory: src/AI/agents
      run: |
        uvicorn api.main:app --host 0.0.0.0 --port 8071 > server.log 2>&1 &
        sleep 5
        curl --fail --retry 6 --retry-delay 5 --retry-connrefused http://localhost:8071/health

    - name: Output server logs on failure
      if: failure()
      working-directory: src/AI/agents
      run: cat server.log
