name: Validate AGENTS.md docs

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    paths:
      - "**/AGENTS.md"
      - "**/CLAUDE.md"
      - ".github/scripts/agents-docs-validate.mjs"
      - ".github/workflows/agents-docs-validate.yaml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate AGENTS.md hierarchy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Validate AGENTS.md hierarchy
        run: node .github/scripts/agents-docs-validate.mjs
