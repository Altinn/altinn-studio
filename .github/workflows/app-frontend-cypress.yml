name: App Frontend - Cypress

on:
  schedule:
    - cron: '0 3 * * 1-5'
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review, converted_to_draft, closed]
    paths:
      - 'src/App/backend/**'
      - 'src/App/codelists/**'
      - 'src/App/fileanalyzers/**'
      - 'src/Runtime/localtest/**'
      - 'src/Runtime/pdf3/**'
      - 'src/App/frontend/src/**'
      - 'src/App/frontend/test/**'
      - 'src/App/frontend/package.json'
      - 'src/test/apps/**'
      - 'app-libs/form-component/src/**'
      - 'app-libs/form-component/package.json'
      - 'app-libs/language/src/**'
      - 'app-libs/language/package.json'
      - '.github/actions/**'
      - '.github/workflows/app-frontend-cypress.yml'
      - '!**/AGENTS.md'
      - '!**/CLAUDE.md'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build-frontend:
    if: |
      (github.event_name != 'pull_request' || (github.event.action != 'closed' && !github.event.pull_request.draft)) &&
      github.repository_owner == 'Altinn' &&
      (
        (github.event_name != 'pull_request' && github.event.repository.fork == false) ||
        (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false)
      )
    name: Build Frontend
    runs-on: self-hosted-single
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Build frontend
        uses: ./.github/actions/app-build-frontend

  build-frontend-external:
    if: |
      (github.event_name != 'pull_request' || (github.event.action != 'closed' && !github.event.pull_request.draft)) &&
      github.repository_owner == 'Altinn' &&
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true)
    name: Build Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Build frontend
        uses: ./.github/actions/app-build-frontend

  build-app-run-targets:
    name: Build App Run Targets
    if: |
      (github.event_name != 'pull_request' || (github.event.action != 'closed' && !github.event.pull_request.draft)) &&
      github.repository_owner == 'Altinn'
    runs-on: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true && 'ubuntu-latest' || 'self-hosted-single' }}
    timeout-minutes: 45
    outputs:
      app-run-targets-json: ${{ steps.app-run-targets.outputs.app-run-targets-json }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Build app run targets
        id: app-run-targets
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const fs = require('fs/promises');
            const nodePath = require('path');

            const appRoot = 'src/test/apps';
            const entries = await fs.readdir(appRoot, { withFileTypes: true });
            const targets = entries
              .filter(entry => entry.isDirectory())
              .sort((a, b) => a.name.localeCompare(b.name))
              .map(entry => ({ path: nodePath.posix.join(appRoot, entry.name) }));

            if (targets.length === 0) {
              throw new Error('No app run targets were found.');
            }
            core.setOutput('app-run-targets-json', JSON.stringify(targets));

      - name: Build app process outputs
        shell: bash
        run: |
          mapfile -t app_projects < <(find src/test/apps -path '*/App/*.csproj' -type f | sort)
          if [ "${#app_projects[@]}" -eq 0 ]; then
            echo "No app projects were found."
            exit 1
          fi

          for project in "${app_projects[@]}"; do
            echo "Building ${project}"
            dotnet build "${project}"
          done

      - name: Package app process outputs
        shell: bash
        run: |
          mapfile -t build_dirs < <(find \
            src/test/apps \
            src/App/backend/src \
            src/App/codelists/src \
            src/App/fileanalyzers/src \
            -type d \( -name bin -o -name obj \) -prune -print | sort)

          if [ "${#build_dirs[@]}" -eq 0 ]; then
            echo "No app build output directories were found."
            exit 1
          fi

          tar -czf app-process-build.tar.gz "${build_dirs[@]}"

      - name: Upload app process outputs
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: app-process-build
          path: app-process-build.tar.gz
          if-no-files-found: error
          retention-days: 1

  cypress-run-internal:
    name: Cypress Run Internal
    if: |
      (github.event_name != 'pull_request' || (github.event.action != 'closed' && !github.event.pull_request.draft)) &&
      github.repository_owner == 'Altinn' &&
      (
        (github.event_name != 'pull_request' && github.event.repository.fork == false) ||
        (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false)
      )
    runs-on: self-hosted-single
    timeout-minutes: 120
    needs: [build-frontend, build-app-run-targets]
    defaults:
      run:
        working-directory: src/App/frontend/
    strategy:
      fail-fast: false
      matrix:
        containers: [1, 2, 3, 4, 5, 6]
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Download app process outputs
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: app-process-build
          path: /tmp/app-process-build

      - name: Extract app process outputs
        shell: bash
        run: tar -xzf /tmp/app-process-build/app-process-build.tar.gz -C "${GITHUB_WORKSPACE}"

      - name: Run Local Environment
        uses: ./.github/actions/app-run-local-env
        with:
          run-localtest: true
          app-run-targets-json: ${{ needs.build-app-run-targets.outputs.app-run-targets-json }}
          skip-app-build: true

      - name: Set Percy command based on PR draft status or main branch
        shell: bash
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ] || [ "${{ github.event.pull_request.draft }}" == "false" ]; then
            echo "ENABLE_PERCY=true" >> "$GITHUB_ENV"
          fi

      - name: Install Cypress binary
        shell: bash
        env:
          CYPRESS_CACHE_FOLDER: ${{ github.workspace }}/.cache/Cypress
        run: npx cypress install

      - name: Verify Percy stylesheet access
        if: env.ENABLE_PERCY == 'true'
        shell: bash
        run: |
          echo "Percy discovery browser:"
          realpath /usr/bin/google-chrome
          /usr/bin/google-chrome --version
          echo "Cypress browser:"
          realpath "${CHROME_PATH:-$(command -v chrome)}"
          "${CHROME_PATH:-chrome}" --version
          curl \
            --dump-header - \
            --fail \
            --location \
            --max-time 30 \
            --output /dev/null \
            --show-error \
            http://app-frontend.local.altinn.cloud:8000/altinn-app-frontend.css

      - name: Cypress run
        shell: bash
        env:
          CYPRESS_CACHE_FOLDER: ${{ github.workspace }}/.cache/Cypress
          CYPRESS_PROJECT_ID: o7mikf
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }} # CYPRESS_RECORD_KEY comes from "org secrets"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}
          PERCY_LOGLEVEL: debug
          PERCY_PARALLEL_TOTAL: 6
          PERCY_PARALLEL_NONCE: ${{ github.run_id }}-${{ github.run_attempt }}
          PERCY_BRANCH: ${{ github.head_ref || github.ref_name }}
          PERCY_TARGET_BRANCH: ${{ github.base_ref || 'main' }}
          IS_PR_DRAFT: ${{ github.event.pull_request.draft }}
        run: |
          cypress_args=(
            run
            --record
            --parallel
            --group altinn-app-frontend
            --tag altinn-app-frontend
            --browser "${CHROME_PATH:-chrome}"
            --ci-build-id "${{ github.run_id }}-${{ github.run_attempt }}"
            --spec test/e2e/integration
            # CYPRESS_LOGS_COLLECTOR prints the browser logs of failed tests to the CI log
            # (cypress-terminal-report) - without it the assertion failures only exist on
            # Cypress Cloud.
            --env environment=localtest,CYPRESS_LOGS_COLLECTOR=true
          )

          if [ "${ENABLE_PERCY:-false}" = "true" ]; then
            npx percy exec --parallel -- npx cypress "${cypress_args[@]}"
          else
            npx cypress "${cypress_args[@]}"
          fi

      - name: Upload Percy browser network log
        if: always() && env.ENABLE_PERCY == 'true'
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: percy-netlog-${{ matrix.containers }}
          path: /tmp/percy-netlog.json
          if-no-files-found: error
          retention-days: 1

      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        if: failure()
        with:
          name: app-frontend-logs
          path: |
            src/App/frontend/test/logs/*
            src/App/frontend/test/screenshots/**
            ${{ env.STUDIOCTL_HOME }}/logs/**

      - name: Stop localtest
        if: always()
        uses: ./.github/actions/app-stop-local-env

  cypress-run-external:
    name: Cypress Run External
    if: |
      (github.event_name != 'pull_request' || (github.event.action != 'closed' && !github.event.pull_request.draft)) &&
      github.repository_owner == 'Altinn' &&
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true)

    runs-on: ubuntu-latest
    timeout-minutes: 120
    needs: [build-frontend-external, build-app-run-targets]
    defaults:
      run:
        working-directory: src/App/frontend/

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Download app process outputs
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: app-process-build
          path: /tmp/app-process-build

      - name: Extract app process outputs
        shell: bash
        run: tar -xzf /tmp/app-process-build/app-process-build.tar.gz -C "${GITHUB_WORKSPACE}"

      - name: Run Local Environment
        uses: ./.github/actions/app-run-local-env
        with:
          run-localtest: true
          app-run-targets-json: ${{ needs.build-app-run-targets.outputs.app-run-targets-json }}
          skip-app-build: true

      - name: Install Cypress binary
        shell: bash
        env:
          CYPRESS_CACHE_FOLDER: ${{ github.workspace }}/.cache/Cypress
        run: npx cypress install

      - name: Cypress run
        shell: bash
        env:
          CYPRESS_CACHE_FOLDER: ${{ github.workspace }}/.cache/Cypress
        run: npx cypress run --browser "${CHROME_PATH:-chrome}" --spec test/e2e/integration --env environment=localtest

      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        if: failure()
        with:
          name: app-frontend-external-logs
          path: |
            src/App/frontend/test/logs/*
            src/App/frontend/test/screenshots/*
            src/App/frontend/test/videos/*
            ${{ env.STUDIOCTL_HOME }}/logs/**

      - name: Stop localtest
        if: always()
        uses: ./.github/actions/app-stop-local-env
