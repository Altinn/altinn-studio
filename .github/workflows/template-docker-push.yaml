name: Docker build and push

on:
  workflow_call:
    inputs:
      tags:
        required: true
        type: string
      context:
        required: false
        type: string
        default: '.'
      dockerfile:
        required: false
        type: string
        default: 'Dockerfile'
      registry-name:
        required: true
        type: string
      repository-name:
        required: true
        type: string
      environment:
        required: false
        type: string
        default: ''
      checkout-repository:
        required: false
        type: string
        default: ''
      checkout-ref:
        required: false
        type: string
        default: ''

    secrets:
      client-id:
        required: true
      tenant-id:
        required: true
      subscription-id:
        required: true
      build-args:
        required: false

jobs:
  docker-build-push:
    name: Build and push docker image
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: ${{ inputs.checkout-repository || github.repository }}
          ref: ${{ inputs.checkout-ref || github.sha }}
          persist-credentials: false

      - name: Docker build
        env:
          BUILD_ARGS: ${{ secrets.build-args }}
          CONTEXT: ${{ inputs.context }}
          DOCKERFILE: ${{ inputs.dockerfile }}
          REGISTRY_NAME: ${{ inputs.registry-name }}
          REPOSITORY_NAME: ${{ inputs.repository-name }}
          TAGS: ${{ inputs.tags }}
        run: |
          set -euo pipefail

          image="${REGISTRY_NAME}/${REPOSITORY_NAME}"
          arguments=()

          IFS=',' read -r -a tags <<< "$TAGS"
          for tag in "${tags[@]}"; do
            if [[ -n "$tag" ]]; then
              arguments+=(-t "${image}:${tag}")
            fi
          done

          if [[ -n "$BUILD_ARGS" ]]; then
            IFS=',' read -r -a build_args <<< "$BUILD_ARGS"
            for build_arg in "${build_args[@]}"; do
              if [[ -n "$build_arg" ]]; then
                arguments+=(--build-arg "$build_arg")
              fi
            done
          fi

          docker build "$CONTEXT" -f "$DOCKERFILE" "${arguments[@]}"

      - name: 'Azure login'
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
            client-id: ${{ secrets.client-id }}
            tenant-id: ${{ secrets.tenant-id }}
            subscription-id: ${{ secrets.subscription-id }}

      - name: Log in to Container registry
        run: |
          az acr login --name ${{ inputs.registry-name }} \
          --expose-token --output tsv \
          --query accessToken \
          --subscription ${{ secrets.subscription-id }} \
          --only-show-errors |  docker login ${{ inputs.registry-name }} \
                                --username 00000000-0000-0000-0000-000000000000 \
                                --password-stdin

      - name: Docker push
        env:
          REGISTRY_NAME: ${{ inputs.registry-name }}
          REPOSITORY_NAME: ${{ inputs.repository-name }}
          TAGS: ${{ inputs.tags }}
        run: |
          set -euo pipefail

          image="${REGISTRY_NAME}/${REPOSITORY_NAME}"
          IFS=',' read -r -a tags <<< "$TAGS"
          for tag in "${tags[@]}"; do
            if [[ -n "$tag" ]]; then
              docker push "${image}:${tag}"
            fi
          done
