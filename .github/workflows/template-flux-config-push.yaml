name: Flux config push workflow

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
      registry-name:
        required: true
        type: string
      environment:
        required: true
        type: string
      artifact-environment:
        required: false
        type: string
      config-chart-name:
        required: true
        type: string
      artifact-name:
        required: true
        type: string
      helm-set-arguments:
        required: false
        type: string
      trace-workflow:
        required: false
        type: boolean
        default: false
      trace-team-name:
        required: false
        type: string
        default: ''
      checkout-repository:
        required: false
        type: string
        default: ''
      checkout-ref:
        required: false
        type: string
        default: ''
      source-url:
        required: false
        type: string
        default: ''
      source-revision:
        required: false
        type: string
        default: ''
      tag-latest:
        required: false
        type: boolean
        default: true


    secrets:
      client-id:
        required: true
      tenant-id:
        required: true
      subscription-id:
        required: true
      trace-connection-string:
        required: false
      trace-repo-token:
        required: false

jobs:
  config-oci-artifact-push:
    name: Flux config push
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: ${{ inputs.checkout-repository || github.repository }}
          ref: ${{ inputs.checkout-ref || github.sha }}
          persist-credentials: false

      - name: 'Azure login'
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
            client-id: ${{ secrets.client-id }}
            tenant-id: ${{ secrets.tenant-id }}
            subscription-id: ${{ secrets.subscription-id }}

      - name: Log in to Container registry
        run: |
          az acr login --name ${{ inputs.registry-name }} \
          --expose-token --output tsv \
          --query accessToken \
          --subscription ${{ secrets.subscription-id }} \
          --only-show-errors |  docker login ${{ inputs.registry-name }} \
                                --username 00000000-0000-0000-0000-000000000000 \
                                --password-stdin

      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@bfa461ed2153ae5e0cca6bce08e0845268fb3088 # v2.8.2

      - name: Generate cofiguration file
        env:
          CONFIG_CHART_NAME: ${{ inputs.config-chart-name }}
          HELM_SET_ARGUMENTS: ${{ inputs.helm-set-arguments }}
        run: |
          set -euo pipefail

          mkdir "${CONFIG_CHART_NAME}-rendered"

          arguments=()
          if [[ -n "$HELM_SET_ARGUMENTS" ]]; then
            IFS=',' read -r -a set_arguments <<< "$HELM_SET_ARGUMENTS"
            for set_argument in "${set_arguments[@]}"; do
              if [[ -n "$set_argument" ]]; then
                arguments+=(--set "$set_argument")
              fi
            done
          fi

          helm template "charts/${CONFIG_CHART_NAME}" "${arguments[@]}" > "${CONFIG_CHART_NAME}-rendered/helm-release.yaml"

      - name: Push config artifact
        env:
          ARTIFACT_ENV: ${{ inputs.artifact-environment || inputs.environment }}
          ARTIFACT_NAME: ${{ inputs.artifact-name }}
          CONFIG_CHART_NAME: ${{ inputs.config-chart-name }}
          REGISTRY_NAME: ${{ inputs.registry-name }}
          SOURCE_URL: ${{ inputs.source-url }}
          SOURCE_REVISION: ${{ inputs.source-revision }}
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          artifact_env="$ARTIFACT_ENV"
          source_url="${SOURCE_URL:-$(git config --get remote.origin.url)}"
          source_sha="$(git rev-parse HEAD)"
          fallback_ref="$(git symbolic-ref --short -q HEAD || echo "${GITHUB_REF_NAME:-detached}")"
          source_revision="${SOURCE_REVISION:-${fallback_ref}/${source_sha}}"
          flux push artifact "oci://${REGISTRY_NAME}/configs/${ARTIFACT_NAME}-${artifact_env}:${TAG}" \
          --path="./${CONFIG_CHART_NAME}-rendered" \
          --source="$source_url" \
          --revision="$source_revision"

      - name: Tag artifact as latest
        if: ${{ inputs.tag-latest }}
        env:
          ARTIFACT_ENV: ${{ inputs.artifact-environment || inputs.environment }}
          ARTIFACT_NAME: ${{ inputs.artifact-name }}
          REGISTRY_NAME: ${{ inputs.registry-name }}
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          artifact_env="$ARTIFACT_ENV"
          flux tag artifact "oci://${REGISTRY_NAME}/configs/${ARTIFACT_NAME}-${artifact_env}:${TAG}" --tag latest

      - name: Send Trace to Azure Monitor
        if: ${{ inputs.trace-workflow }}
        uses: altinn/altinn-platform/actions/send-ci-cd-trace@cc4b775eb4d7015674bfcaac762e40f270afab87 # v1.0.1
        with:
            connection_string: ${{ secrets.trace-connection-string }}
            app: "${{ inputs.artifact-name }}"
            team: "${{ inputs.trace-team-name }}"
            repo_token: ${{ secrets.trace-repo-token }}
            environment: ${{ inputs.artifact-environment || inputs.environment }}
