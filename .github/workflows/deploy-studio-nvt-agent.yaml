name: Deploy Studio nvt-agent configuration

on:
  push:
    branches: [main]
    paths:
      - 'infra/studio/nvt-agent/**'
      - '.github/workflows/deploy-studio-nvt-agent.yaml'
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

jobs:
  construct-environments-array:
    uses: ./.github/workflows/template-studio-construct-environments.yaml
    with:
      inputs: '{"environments":"staging"}'
      override-default-studio-environments: staging

  push-artifact:
    name: Push Studio nvt-agent configuration as OCI artifact
    runs-on: ubuntu-latest
    environment: dev
    env:
      REGISTRY_NAME: altinntjenestercontainerregistry
    outputs:
      CONFIG_REPO: ${{ steps.vars.outputs.config-repo }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set vars
        id: vars
        run: |
          SHA="${GITHUB_SHA::10}"
          echo "config-repo=altinntjenestercontainerregistry.azurecr.io/altinn-studio/configs/nvt-agent:${SHA}" >> "$GITHUB_OUTPUT"

      - name: az login
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_FC }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID_FC }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_FC }}

      - name: az acr login
        run: az acr login --name ${{ env.REGISTRY_NAME }}

      - name: flux install
        uses: fluxcd/flux2/action@1fd61a06264d71cf445ed55c4f14d401d26a1c64 # v2.8.8

      - name: Validate artifact
        run: |
          kubectl kustomize infra/studio/nvt-agent/platform >/dev/null
          kubectl kustomize infra/studio/nvt-agent/secrets >/dev/null
          kubectl kustomize infra/studio/nvt-agent/release >/dev/null
          kubectl kustomize infra/studio/nvt-agent/bootstrap >/dev/null
          yq '.spec.values' infra/studio/nvt-agent/release/helm-release.yaml | \
            helm template nvt oci://ghcr.io/mirkosekulic/helm/nvt \
              --version 0.8.2 \
              --namespace nvt \
              --values - >/dev/null
          yq '.spec.values |
            .producer.enabled = true |
            .producer.githubApp.appID = 12345 |
            .producer.githubApp.installationID = 67890 |
            .agentSchedule.template.runtimeClassName = "kata-vm-isolation" |
            .agentSchedule.suspend = false' \
            infra/studio/nvt-agent/release/helm-release.yaml | \
            helm template nvt oci://ghcr.io/mirkosekulic/helm/nvt \
              --version 0.8.2 \
              --namespace nvt \
              --values - >/dev/null

      - name: Push artifact
        run: |
          flux push artifact oci://${{ steps.vars.outputs.config-repo }} \
            --provider=azure \
            --reproducible \
            --path="infra/studio/nvt-agent" \
            --source="$(git config --get remote.origin.url)" \
            --revision="$(git branch --show-current)/$(git rev-parse HEAD)"

  tag:
    name: Tag artifact
    needs: [push-artifact, construct-environments-array]
    runs-on: ubuntu-latest
    environment: ${{ matrix.environment }}
    env:
      REGISTRY_NAME: altinntjenestercontainerregistry
    strategy:
      matrix:
        include: ${{ fromJSON(needs.construct-environments-array.outputs.result) }}
    steps:
      - name: az login
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_FC }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID_FC }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_FC }}

      - name: az acr login
        run: az acr login --name ${{ env.REGISTRY_NAME }}

      - name: flux install
        uses: fluxcd/flux2/action@1fd61a06264d71cf445ed55c4f14d401d26a1c64 # v2.8.8

      - name: Tag artifact
        run: |
          flux tag artifact oci://${{ needs.push-artifact.outputs.CONFIG_REPO }} \
            --tag ${{ matrix.environment }}
