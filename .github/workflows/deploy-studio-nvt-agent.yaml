name: Deploy Studio nvt-agent configuration

on:
  pull_request:
    branches: [main]
    paths:
      - 'infra/studio/nvt-agent/**'
      - 'charts/altinn-loadbalancer/templates/networkpolicy.yaml'
      - 'scripts/validate-studio-nvt-agent.sh'
      - 'src/load-balancer/k8s/extra-locations.conf'
      - 'src/load-balancer/k8s/extra-upstreams.conf'
      - 'src/load-balancer/nginx.conf.template'
      - 'src/load-balancer/tests/nvt-*'
      - '.github/workflows/deploy-studio-nvt-agent.yaml'
  push:
    branches:
      - main
      - feat/nvt-agent-gitops
    paths:
      - 'infra/studio/nvt-agent/**'
      - 'scripts/validate-studio-nvt-agent.sh'
      - '.github/workflows/deploy-studio-nvt-agent.yaml'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  validate:
    name: Validate NVT configuration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Validate manifests and policy
        run: ./scripts/validate-studio-nvt-agent.sh

      - name: Verify NVT cookie path preservation
        run: ./src/load-balancer/tests/nvt-cookie-path-smoke.sh

  deployment-metadata-merge-gate:
    name: Require resolved NVT deployment metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Reject unresolved deployment metadata
        run: |
          if rg --line-number 'REPLACE_WITH_[A-Z0-9_]+' \
            infra/studio/nvt-agent/bootstrap/deployment-metadata.yaml; then
            echo '::error::Replace every REPLACE_WITH_* deployment metadata value before merge.'
            exit 1
          fi

  construct-environments-array:
    if: >-
      github.event_name != 'pull_request' &&
      (github.ref == 'refs/heads/main' ||
      github.ref == 'refs/heads/feat/nvt-agent-gitops')
    needs: [validate, deployment-metadata-merge-gate]
    uses: ./.github/workflows/template-studio-construct-environments.yaml
    with:
      inputs: '{"environments":"staging"}'
      override-default-studio-environments: staging

  push-artifact:
    name: Push Studio nvt-agent configuration as OCI artifact
    if: >-
      github.event_name != 'pull_request' &&
      (github.ref == 'refs/heads/main' ||
      github.ref == 'refs/heads/feat/nvt-agent-gitops')
    needs: [validate, deployment-metadata-merge-gate, construct-environments-array]
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      id-token: write
      contents: read
    env:
      REGISTRY_NAME: altinntjenestercontainerregistry
    outputs:
      CONFIG_REPO: ${{ steps.vars.outputs.config-repo }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set vars
        id: vars
        run: |
          SHA="${GITHUB_SHA::10}"
          echo "config-repo=altinntjenestercontainerregistry.azurecr.io/altinn-studio/configs/nvt-agent:${SHA}" >> "$GITHUB_OUTPUT"

      - name: az login
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_FC }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID_FC }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_FC }}

      - name: az acr login
        run: az acr login --name ${{ env.REGISTRY_NAME }}

      - name: flux install
        uses: fluxcd/flux2/action@1fd61a06264d71cf445ed55c4f14d401d26a1c64 # v2.8.8

      - name: Push artifact
        run: |
          flux push artifact oci://${{ steps.vars.outputs.config-repo }} \
            --provider=azure \
            --reproducible \
            --path="infra/studio/nvt-agent" \
            --source="$(git config --get remote.origin.url)" \
            --revision="$(git branch --show-current)/$(git rev-parse HEAD)"

  tag:
    name: Tag artifact
    needs: [push-artifact, construct-environments-array]
    if: >-
      github.event_name != 'pull_request' &&
      (github.ref == 'refs/heads/main' ||
      github.ref == 'refs/heads/feat/nvt-agent-gitops')
    runs-on: ubuntu-latest
    environment: ${{ matrix.environment }}
    permissions:
      id-token: write
      contents: read
    env:
      REGISTRY_NAME: altinntjenestercontainerregistry
    strategy:
      matrix:
        include: ${{ fromJSON(needs.construct-environments-array.outputs.result) }}
    steps:
      - name: az login
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_FC }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID_FC }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_FC }}

      - name: az acr login
        run: az acr login --name ${{ env.REGISTRY_NAME }}

      - name: flux install
        uses: fluxcd/flux2/action@1fd61a06264d71cf445ed55c4f14d401d26a1c64 # v2.8.8

      - name: Tag artifact
        run: |
          flux tag artifact oci://${{ needs.push-artifact.outputs.CONFIG_REPO }} \
            --tag ${{ matrix.environment }}
