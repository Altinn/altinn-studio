name: App Backend - CodeQL

on:
  push:
    branches: [main]
    paths:
      - 'src/App/backend/**'
      - '.github/actions/codeql-config/**'
      - '.github/codeql/**'
      - '.github/workflows/app-backend-codeql.yml'
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    paths:
      - 'src/App/backend/**'
      - '.github/actions/codeql-config/**'
      - '.github/codeql/**'
      - '.github/workflows/app-backend-codeql.yml'
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/App/backend/
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: ['csharp']

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          global-json-file: src/App/backend/global.json

      - name: Generate CodeQL config
        id: codeql-config
        uses: ./.github/actions/codeql-config
        with:
          language: ${{ matrix.language }}

      - name: Initialize CodeQL
        uses: github/codeql-action/init@820e3160e279568db735cee8ed8f8e77a6da7818 # v3
        with:
          languages: ${{ matrix.language }}
          build-mode: manual
          queries: ${{ steps.codeql-config.outputs.queries }}
          config-file: ${{ steps.codeql-config.outputs.config-file }}

      - name: Build solution
        run: dotnet build solutions/Src.sln -v m

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@820e3160e279568db735cee8ed8f8e77a6da7818 # v3
        with:
          category: '/codeql/app/backend/${{ matrix.language }}'
