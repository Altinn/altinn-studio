name: Designer Backend - CodeQL

on:
  push:
    branches: [main]
    paths:
      - 'src/Designer/testdata/**'
      - 'src/Designer/backend/**'
      - '.github/actions/codeql-config/**'
      - '.github/codeql/**'
      - '.github/workflows/designer-backend-codeql.yml'
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review, converted_to_draft, closed]
    paths:
      - 'src/Designer/testdata/**'
      - 'src/Designer/backend/**'
      - '.github/actions/codeql-config/**'
      - '.github/codeql/**'
      - '.github/workflows/designer-backend-codeql.yml'
      - '!**/AGENTS.md'
      - '!**/CLAUDE.md'
  workflow_dispatch:
  schedule:
    - cron: '45 1 * * 0'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  analyze:
    if: ${{ github.event_name != 'pull_request' || (github.event.action != 'closed' && !github.event.pull_request.draft) }}
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup .NET
        uses: actions/setup-dotnet@2016bd2012dba4e32de620c46fe006a3ac9f0602 # v5.0.1
        with:
          dotnet-version: '9.0.x'

      - name: Generate CodeQL config
        id: codeql-config
        uses: ./.github/actions/codeql-config
        with:
          language: csharp

      - name: Initialize CodeQL
        uses: github/codeql-action/init@4187e74d05793876e9989daffde9c3e66b4acd07 # v3
        with:
          languages: csharp
          build-mode: manual
          queries: ${{ steps.codeql-config.outputs.queries }}
          config-file: ${{ steps.codeql-config.outputs.config-file }}

      - name: Build solution
        run: dotnet build backend/Src.sln -v m
        shell: bash
        working-directory: src/Designer/

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@4187e74d05793876e9989daffde9c3e66b4acd07 # v3
        with:
          category: "/codeql/designer/backend/csharp"
