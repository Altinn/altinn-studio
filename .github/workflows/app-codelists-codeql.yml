name: App Codelists - CodeQL

on:
  push:
    branches: [main]
    paths:
      - 'src/App/codelists/**'
      - '.github/actions/codeql-config/**'
      - '.github/codeql/**'
      - '.github/workflows/app-codelists-codeql.yml'
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review, converted_to_draft, closed]
    paths:
      - 'src/App/codelists/**'
      - '.github/actions/codeql-config/**'
      - '.github/codeql/**'
      - '.github/workflows/app-codelists-codeql.yml'
      - '!**/AGENTS.md'
      - '!**/CLAUDE.md'
  workflow_dispatch:
  schedule:
    - cron: '15 1 * * 0'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  analyze:
    if: ${{ github.event_name != 'pull_request' || (github.event.action != 'closed' && !github.event.pull_request.draft) }}
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: src/App/codelists/
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'csharp' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Generate CodeQL config
      id: codeql-config
      uses: ./.github/actions/codeql-config
      with:
        language: ${{ matrix.language }}

    - name: Initialize CodeQL
      uses: github/codeql-action/init@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3
      with:
        languages: ${{ matrix.language }}
        build-mode: manual
        queries: ${{ steps.codeql-config.outputs.queries }}
        config-file: ${{ steps.codeql-config.outputs.config-file }}

    - name: Setup .NET
      uses: actions/setup-dotnet@2016bd2012dba4e32de620c46fe006a3ac9f0602 # v5.0.1
      with:
        global-json-file: src/App/codelists/global.json

    - name: Build solution
      run: dotnet build solutions/Src.slnx -v m

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3
      with:
        category: "/codeql/app/codelists/${{ matrix.language }}"
