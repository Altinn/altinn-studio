name: Runtime kubernetes-wrapper - Build and test

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review, converted_to_draft, closed]
    paths:
      - 'src/Runtime/kubernetes-wrapper/**'
      - '.github/workflows/runtime-kubernetes-wrapper-integrationtests-kind.yaml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  test:
    if: ${{ github.event_name != 'pull_request' || (github.event.action != 'closed' && !github.event.pull_request.draft) }}
    name: Build and test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    defaults:
      run:
        working-directory: src/Runtime/kubernetes-wrapper

    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Setup .NET
      uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
      with:
        global-json-file: src/Runtime/kubernetes-wrapper/global.json

    - name: Restore tools
      run: dotnet tool restore

    - name: Formatting
      run: dotnet csharpier check .

    - name: Test
      run: make test

    - name: Test E2E
      run: make test-e2e
