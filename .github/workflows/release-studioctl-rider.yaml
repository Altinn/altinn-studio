name: Release - studioctl-rider

# Stable versions use the default channel; prereleases use eap.
# Reruns reuse releases, replace assets, and skip published versions.

on:
  pull_request:
    types: [closed]
    branches:
      - main
      - 'release/studioctl-rider/v*'
    paths:
      - 'src/cli/studioctl-lsp/rider/CHANGELOG.md'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  resolve-release-context:
    name: Resolve release context
    runs-on: ubuntu-latest
    # Fork PRs require a manual rerun from main.
    if: >
      (
        github.event_name == 'workflow_dispatch' &&
        github.ref == 'refs/heads/main'
      ) ||
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.merged == true &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        contains(github.event.pull_request.labels.*.name, 'release/studioctl-rider')
      )
    outputs:
      environment: ${{ steps.context.outputs.environment }}
      version: ${{ steps.context.outputs.version }}
      channel: ${{ steps.context.outputs.channel }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.merge_commit_sha || github.sha }}
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: 'src/tools/releaser/go.mod'
          cache-dependency-path: src/tools/releaser/go.sum

      - name: Resolve environment
        id: context
        env:
          BASE_BRANCH: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.ref || 'main' }}
        run: |
          version="$(go run . resolve-version --component studioctl-rider --base-branch "$BASE_BRANCH")"

          environment="prod"
          channel="default"
          if [[ "$version" == *"-preview."* ]]; then
            environment="dev"
          elif [[ "$version" == *"-rc."* ]]; then
            environment="staging"
          fi
          if [[ "$version" == *"-"* ]]; then
            channel="eap"
          fi

          {
            echo "version=$version"
            echo "environment=$environment"
            echo "channel=$channel"
          } >> "$GITHUB_OUTPUT"
        working-directory: src/tools/releaser

  release:
    name: Build, release and publish
    runs-on: ubuntu-latest
    needs: resolve-release-context
    permissions:
      contents: write
    environment: ${{ needs.resolve-release-context.outputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.merge_commit_sha || github.sha }}
          persist-credentials: false

      - name: Checkout base branch
        env:
          BASE_BRANCH: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.ref || 'main' }}
          MERGE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.merge_commit_sha || github.sha }}
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && "${GITHUB_REF}" != "refs/heads/main" ]]; then
            echo "Manual studioctl-rider releases must be dispatched from main"
            exit 1
          fi

          if [[ "${BASE_BRANCH}" != "main" && ! "${BASE_BRANCH}" =~ ^release/studioctl-rider/v[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid base branch: ${BASE_BRANCH}"
            exit 1
          fi

          git fetch origin "$BASE_BRANCH"
          git checkout -B "$BASE_BRANCH" "$MERGE_SHA"

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@3f131e8634966bd73d06cc69884922b02e6faf92 # v6

      - name: Setup Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6
        with:
          cache-read-only: true

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: 'src/tools/releaser/go.mod'
          cache-dependency-path: src/tools/releaser/go.sum

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run release workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE_BRANCH: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.ref || 'main' }}
          VERSION: ${{ needs.resolve-release-context.outputs.version }}
        run: |
          if gh release view "studioctl-rider/${VERSION}" >/dev/null 2>&1; then
            echo "Release studioctl-rider/${VERSION} already exists; continuing in retry mode"
            mkdir -p ../../build/release
            gh release view "studioctl-rider/${VERSION}" --json body -q .body > ../../build/release/release-notes.md
          else
            go run . workflow --component studioctl-rider --base-branch "$BASE_BRANCH"
          fi
        working-directory: src/tools/releaser

      - name: Build plugin
        env:
          PLUGIN_CHANGE_NOTES_FILE: ${{ github.workspace }}/build/release/release-notes.md
          VERSION: ${{ needs.resolve-release-context.outputs.version }}
        run: ./gradlew buildPlugin -PpluginVersion="${VERSION#v}"
        working-directory: src/cli/studioctl-lsp/rider

      - name: Attach plugin zip to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.resolve-release-context.outputs.version }}
        run: gh release upload "studioctl-rider/${VERSION}" src/cli/studioctl-lsp/rider/build/distributions/*.zip --clobber

      - name: Publish to JetBrains Marketplace
        env:
          JETBRAINS_MARKETPLACE_TOKEN: ${{ secrets.JETBRAINS_MARKETPLACE_TOKEN }}
          JETBRAINS_PUBLISH_CHANNEL: ${{ needs.resolve-release-context.outputs.channel }}
          PLUGIN_CHANGE_NOTES_FILE: ${{ github.workspace }}/build/release/release-notes.md
          VERSION: ${{ needs.resolve-release-context.outputs.version }}
        run: |
          # API: https://plugins.jetbrains.com/docs/marketplace/plugin-details.html
          # Only 200 and 404 are valid lookup responses.
          channel_param=""
          if [[ "$JETBRAINS_PUBLISH_CHANNEL" != "default" ]]; then
            channel_param="&channel=${JETBRAINS_PUBLISH_CHANNEL}"
          fi
          status="$(curl -sS -o listing.txt -w '%{http_code}' \
            "https://plugins.jetbrains.com/plugins/list?pluginId=studio.altinn.lsp${channel_param}")"

          already_published="false"
          case "$status" in
            200)
              if grep -qF "<version>${VERSION#v}</version>" listing.txt; then
                already_published="true"
              fi
              ;;
            404)
              echo "Plugin not yet listed on the marketplace; proceeding to publish"
              ;;
            *)
              echo "Marketplace lookup failed with HTTP ${status}:" >&2
              cat listing.txt >&2
              exit 1
              ;;
          esac
          rm -f listing.txt

          if [[ "$already_published" == "true" ]]; then
            echo "Version ${VERSION#v} is already on the marketplace; skipping publish"
          else
            ./gradlew publishPlugin -PpluginVersion="${VERSION#v}"
          fi
        working-directory: src/cli/studioctl-lsp/rider

      - name: Summary
        if: always()
        env:
          BASE_BRANCH: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.ref || 'main' }}
          PR_NUMBER: ${{ github.event_name == 'pull_request' && github.event.pull_request.number || '' }}
          RELEASE_VERSION: ${{ needs.resolve-release-context.outputs.version }}
          MARKETPLACE_CHANNEL: ${{ needs.resolve-release-context.outputs.channel }}
        run: |
          {
            echo "## Release Summary"
            echo ""
            if [[ -n "${PR_NUMBER}" ]]; then
              echo "- **PR**: #${PR_NUMBER}"
            fi
            echo "- **Base branch**: ${BASE_BRANCH}"
            echo "- **Version**: ${RELEASE_VERSION}"
            echo "- **Environment**: ${{ needs.resolve-release-context.outputs.environment }}"
            echo "- **Marketplace channel**: ${MARKETPLACE_CHANNEL}"
            echo "- **Version source**: latest released section in src/cli/studioctl-lsp/rider/CHANGELOG.md"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"
