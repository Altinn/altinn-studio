name: App Frontend - CodeQL

on:
  push:
    branches: [main]
    paths:
      - 'src/App/frontend/**'
      - '.github/actions/codeql-config/**'
      - '.github/codeql/**'
      - '.github/workflows/app-frontend-codeql.yml'
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    paths:
      - 'src/App/frontend/**'
      - '.github/actions/codeql-config/**'
      - '.github/codeql/**'
      - '.github/workflows/app-frontend-codeql.yml'
  workflow_dispatch:
  schedule:
    - cron: '35 1 * * 0'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Generate CodeQL config
        id: codeql-config
        uses: ./.github/actions/codeql-config
        with:
          language: javascript
          paths: |
            src/App/frontend

      - name: Initialize CodeQL
        uses: github/codeql-action/init@820e3160e279568db735cee8ed8f8e77a6da7818 # v3
        with:
          languages: javascript
          queries: ${{ steps.codeql-config.outputs.queries }}
          config-file: ${{ steps.codeql-config.outputs.config-file }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@820e3160e279568db735cee8ed8f8e77a6da7818 # v3
        with:
          category: "/codeql/app/frontend/javascript"
