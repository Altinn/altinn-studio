name: Designer Frontend - Playwright tests in Staging

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright-run:
    name: 'Playwright Tests'
    runs-on: self-hosted-single
    timeout-minutes: 30

    steps:
      - name: 'Checking Out Code'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          cache: 'yarn'

      - name: Get yarn cache directory path
        working-directory: src/Designer/frontend
        id: yarn-cache-dir-path
        run: echo "dir=$(yarn config get cacheFolder)" >> $GITHUB_OUTPUT

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        id: yarn-cache
        with:
          path: ${{ steps.yarn-cache-dir-path.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Attempt to wait for deploy to environment (15 minutes sleep)
        run: |
          if [ "${{ github.run_attempt }}" != "1" ]; then
            echo "Skip waiting for deploy, since this is a re-run of the pipeline."
          else
            sleep 15m
          fi

      - name: Playwright run
        working-directory: src/Designer/frontend/testing/playwright
        env:
          PLAYWRIGHT_TEST_BASE_URL: 'https://staging.altinn.studio'
          PLAYWRIGHT_USER: 'AutoTest'
          PLAYWRIGHT_PASS: ${{ secrets.AUTO_TEST_USER_PWD }}
          GITEA_ACCESS_TOKEN: ${{ secrets.AUTO_TEST_USER_TOKEN_STAGING }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          yarn install --immutable --inline-builds
          yarn playwright:test:all

      - name: Store artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        if: failure()
        with:
          name: playwright-screenshots
          path: src/Designer/frontend/testing/playwright/test-results
