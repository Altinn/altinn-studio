name: Admin - deploy syncroot

on:
  push:
    branches:
      - main
    paths:
      - infra/admin/syncroot/**
      - .github/workflows/deploy-admin-syncroot.yaml
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  push-syncroot-artifact:
    name: Push syncroot as OCI artifact
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    outputs:
      short-sha: ${{ steps.vars.outputs.short-sha }}
    defaults:
      run:
        working-directory: ./infra/admin
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set vars
        id: vars
        run: echo "short-sha=${GITHUB_SHA::10}" >> "$GITHUB_OUTPUT"

      - name: az login
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ secrets.DIS_SYNCROOT_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.DIS_SYNCROOT_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.DIS_SYNCROOT_AZURE_SUBSCRIPTION_ID }}

      - name: az acr login
        run: az acr login --name altinncr

      - name: flux install
        uses: fluxcd/flux2/action@1fd61a06264d71cf445ed55c4f14d401d26a1c64 # v2.8.8

      - name: push syncroot artifact
        run: |
          cd syncroot/
          flux push artifact oci://altinncr.azurecr.io/studio/syncroot-admin:${{ steps.vars.outputs.short-sha }} \
            --provider=generic \
            --reproducible \
            --path="." \
            --source="$(git config --get remote.origin.url)" \
            --revision="$(git branch --show-current)/$(git rev-parse HEAD)"

  tag-syncroot:
    name: Tag syncroot (${{ matrix.tag }})
    needs: push-syncroot-artifact
    runs-on: ubuntu-latest
    environment: ${{ matrix.environment }}
    permissions:
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - tag: test
            environment: adminservices_test
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: az login
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ secrets.DIS_SYNCROOT_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.DIS_SYNCROOT_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.DIS_SYNCROOT_AZURE_SUBSCRIPTION_ID }}

      - name: az acr login
        run: az acr login --name altinncr

      - name: flux install
        uses: fluxcd/flux2/action@1fd61a06264d71cf445ed55c4f14d401d26a1c64 # v2.8.8

      - name: tag syncroot artifact
        run: |
          flux tag artifact oci://altinncr.azurecr.io/studio/syncroot-admin:${{ needs.push-syncroot-artifact.outputs.short-sha }} \
            --tag ${{ matrix.tag }}
