name: GitHub Runner - Parity Diagnostics

on:
  workflow_dispatch:

jobs:
  github-hosted:
    name: GitHub-hosted Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Collect pre-setup diagnostics
        shell: bash
        run: bash .github/workflows/scripts/github-runner-parity.sh pre-setup

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: src/tools/releaser/go.mod
          cache-dependency-path: src/tools/releaser/go.sum

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '22'

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Collect post-setup diagnostics
        shell: bash
        run: bash .github/workflows/scripts/github-runner-parity.sh post-setup

  self-hosted:
    name: Self-hosted runner
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Collect pre-setup diagnostics
        shell: bash
        run: bash .github/workflows/scripts/github-runner-parity.sh pre-setup

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: src/tools/releaser/go.mod
          cache-dependency-path: src/tools/releaser/go.sum

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '22'

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Collect post-setup diagnostics
        shell: bash
        run: bash .github/workflows/scripts/github-runner-parity.sh post-setup

  self-hosted-single:
    name: Self-hosted single-container runner
    runs-on: self-hosted-single
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Collect pre-setup diagnostics
        shell: bash
        run: bash .github/workflows/scripts/github-runner-parity.sh pre-setup

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: src/tools/releaser/go.mod
          cache-dependency-path: src/tools/releaser/go.sum

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '22'

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Collect post-setup diagnostics
        shell: bash
        run: bash .github/workflows/scripts/github-runner-parity.sh post-setup
