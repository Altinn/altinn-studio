name: GitHub Runner - Parity Diagnostics

on:
  workflow_dispatch:

jobs:
  github-hosted:
    name: GitHub-hosted Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Collect pre-setup diagnostics
        shell: bash
        run: bash .github/workflows/scripts/github-runner-parity.sh pre-setup

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: src/tools/releaser/go.mod
          cache-dependency-path: src/tools/releaser/go.sum

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'

      - name: Setup .NET
        uses: actions/setup-dotnet@2016bd2012dba4e32de620c46fe006a3ac9f0602 # v5.0.1
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Collect post-setup diagnostics
        shell: bash
        run: bash .github/workflows/scripts/github-runner-parity.sh post-setup

  self-hosted:
    name: Self-hosted runner
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Collect pre-setup diagnostics
        shell: bash
        run: bash .github/workflows/scripts/github-runner-parity.sh pre-setup

      - name: Setup Go
