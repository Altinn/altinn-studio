name: CLI (VS Code extension) - Build and package

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    paths:
      - "src/cli/studioctl-lsp/vscode/**"
      - .github/workflows/cli-vscode-extension.yaml
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  package:
    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.draft }}
    name: Compile and package
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: src/cli/studioctl-lsp/vscode
        run: npm ci

      - name: Compile
        working-directory: src/cli/studioctl-lsp/vscode
        run: npm run compile

      - name: Package
        working-directory: src/cli/studioctl-lsp/vscode
        run: npx --yes @vscode/vsce package -o altinn-studio-lsp.vsix --allow-missing-repository --skip-license
