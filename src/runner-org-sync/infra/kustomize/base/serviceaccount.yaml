apiVersion: v1
kind: ServiceAccount
metadata:
  # Keep this name stable: the Azure Entra federated credential subject is
  # bound to ServiceAccount name + namespace. Renaming this SA invalidates
  # Workload Identity until the federated credential is updated to match.
  name: runner-org-sync
  annotations:
    azure.workload.identity/client-id: "${RUNNER_ORG_SYNC_ENTRA_CLIENT_ID}"
