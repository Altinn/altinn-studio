# Pipeline definition for augmenter-agent.
# Each step runs in order. Agent steps may publish JSON into the pipeline context
# under a key, and later steps may consume it via `consumeContext`.
#
# Field reference:
#   type:           mapping-pdf | agent-pdf
#   mapper:         keyed IDataMapper registered in Program.cs
#   promptBuilder:  keyed IPromptBuilder (default: "default")
#   responseParser: keyed IResponseParser (default: "default")
#   skillFolder:    folder under templates root containing skill.md
#   template:       Typst template under templates root
#   schema:         (optional) JSON schema injected into the prompt
#   output:         filename for the produced PDF in the response
#   publishTo:      (optional) PipelineContext key where evaluated JSON is stored
#   consumeContext: (optional) PipelineContext keys appended to this step's prompt
#   expectedJsonKey:(optional) parser validates that this top-level key exists

steps:
  - name: request-info
    type: mapping-pdf
    mapper: request-info
    template: request-info.typ
    output: request-info.pdf

  - name: checklist-agent
    type: agent-pdf
    mapper: checklist
    skillFolder: checklist
    template: checklist.typ
    output: checklist.pdf
    expectedJsonKey: sjekkliste
