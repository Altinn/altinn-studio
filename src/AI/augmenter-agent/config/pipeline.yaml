# Pipeline definition for augmenter-agent.
# Each step runs in order. Steps may publish JSON into the pipeline context
# under a key, and later steps may read it.
#
# Step types:
#   mapping-pdf:             deterministic JsonPathMapper → Typst PDF (no LLM)
#   agent-pdf-orchestrated:  per-item LLM loops with deterministic tools → aggregate → Typst PDF
#
# Field reference (all):
#   mapper:            filename stem of a <name>.json spec under ContentPaths.MappingsRoot
#   template:          Typst template filename under ContentPaths.TemplatesRoot
#   docxTemplate:      (optional) DOCX Markdown template under TemplatesRoot
#   output:            output PDF (and DOCX) filename in the response
#   publishTo:         (optional) PipelineContext key where the evaluated JSON is stored
#
# Field reference (agent-pdf-orchestrated only):
#   rulesFolder:       folder under RulesRoot with per-item *.md (use "." for the root)
#   schemaFile:        filename of the output schema under RegistriesRoot (default: sjekkliste.json)
#   maxToolIterations: hard cap on tool-call loops per item (default: 5)
#   concurrency:       max parallel per-item LLM loops (default: 5)
#   traceDir:          optional per-item trace folder (relative paths resolve under temp)

steps:
  - name: request-info
    type: mapping-pdf
    mapper: request-info
    template: request-info.typ
    output: request-info.pdf

  - name: checklist-agent
    type: agent-pdf-orchestrated
    mapper: checklist
    rulesFolder: .
    template: checklist.typ
    output: checklist.pdf
