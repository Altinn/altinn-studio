services:
  augmenter-agent:
    build:
      context: .
      dockerfile: dockerfile
    ports:
      - "8072:8072"
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=development
      # Sandkasse defaults — overridable via .env. ApiKey is bound from
      # SANDKASSE_API_KEY in .env via the explicit mapping below.
      - Agent__Provider=sandkasse-http
      - Agent__BaseUrl=https://gw.sandkasse.ai/v1
      - Agent__Model=telenor:gemma4
      - Agent__ApiKey=${SANDKASSE_API_KEY}
      # Sandkasse-admin bumpet context-window til 32k (mai 2026). Med
      # 27KB system-prompt + søknad er det god plass til lange svar.
      - Agent__MaxTokens=8192
    volumes:
      # Mount the active config. To run against a different tenant config,
      # copy docker-compose.override.yaml.example → docker-compose.override.yaml.
      # Private-tenant deployments should pin an image tag and mount a private
      # config repo — see DEPLOYMENT.md.
      - ./config:/etc/augmenter:ro
    extra_hosts:
      # Lets the container reach services on the Docker host (Linux needs this; Mac/Windows have it built-in).
      - "host.docker.internal:host-gateway"
