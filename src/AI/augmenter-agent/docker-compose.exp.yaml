# Experiment overlay: run multiple isolated augmenter-agent instances in parallel.
#
# Usage from a worktree:
#   $env:EXP_NAME='prompt-tweaks'; $env:EXP_PORT='8073'; $env:EXP_PI_DIR='./.pi-state-prompt-tweaks'
#   docker compose -f docker-compose.yaml -f docker-compose.exp.yaml --project-name augmenter-exp-prompt-tweaks up -d
#
# EXP_NAME is for human-readable container naming.
# EXP_PORT must be unique per concurrent instance.
# EXP_PI_DIR isolates Pi session state so parallel Pi processes don't trample each other.
services:
  augmenter-agent:
    container_name: augmenter-agent-${EXP_NAME:-exp}
    ports: !override
      - "${EXP_PORT:-8073}:8072"
    volumes:
      - ${EXP_PI_DIR:-./.pi-state-exp}:/home/appuser/.pi
