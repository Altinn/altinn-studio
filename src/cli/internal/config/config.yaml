      tag: "2.4.1"
    mimir:
      image: grafana/mimir
      tag: "2.12.0"
    loki:
      image: grafana/loki
      tag: "3.0.0"
    otel-collector:
      image: otel/opentelemetry-collector-contrib
      tag: "0.98.0"
    grafana:
      image: grafana/grafana
      tag: "10.4.2"
