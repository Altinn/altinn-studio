apiVersion: keda.sh/v1alpha1
kind: ScaledJob
metadata:
  name: github-runners
  labels:
    app.kubernetes.io/name: github-runner
    app.kubernetes.io/component: runner
  annotations:
    altinn.studio/image: altinntjenestercontainerregistry.azurecr.io/altinn-studio/github-runner:latest
    altinn.studio/image-tag: latest
spec:
  maxReplicaCount: 16
  minReplicaCount: 0
  pollingInterval: 30
  # Keep in-flight CI jobs running when the runner image/spec changes
  # default strategy cancels running job on updates
  # (this lets us deploy runner changes without interrupting active workflows)
  rollout:
    strategy: gradual
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 5
  jobTargetRef:
    backoffLimit: 0
    ttlSecondsAfterFinished: 300
    activeDeadlineSeconds: 7200
    template:
      metadata:
        annotations:
          # Same as above, we want to leave time for nodes to complete all jobs
          # before letting the cluster-autoscaler shutdown/drain nodes for scaledown
          cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
        labels:
          app.kubernetes.io/name: github-runner
          app.kubernetes.io/component: runner
      spec:
        runtimeClassName: kata-vm-isolation
        restartPolicy: Never
        hostAliases:
          - ip: "127.0.0.1"
            hostnames:
              - studio.localhost
        securityContext:
          fsGroup: 1001
        initContainers:
          - name: dockerd
            image: docker:dind
            imagePullPolicy: IfNotPresent
            restartPolicy: Always
            securityContext:
              privileged: true
            env:
              - name: DOCKER_TLS_CERTDIR
                value: /certs
              - name: DOCKER_REGISTRY_MIRROR
                value: https://mirror.gcr.io
            command: ["sh", "-c"]
            args:
              - |
                if [ "$(df -PT /var/lib/docker | awk 'NR==2 {print $2}')" = "virtiofs" ]; then
                  apk add --no-cache e2fsprogs &&
                  truncate -s 30G /tmp/docker-disk.img &&
                  mkfs.ext4 -F /tmp/docker-disk.img &&
                  mount /tmp/docker-disk.img /var/lib/docker
                fi
                exec dockerd-entrypoint.sh --host=tcp://0.0.0.0:2376 --registry-mirror="${DOCKER_REGISTRY_MIRROR}"
            # Kata reports runtime SIGKILL as raw exit code 9, which makes a
            # successful Job look like Init:Error after Kubernetes stops this
            # restartable init sidecar. Start dockerd shutdown from inside the
            # guest so it can exit cleanly before the runtime stop path runs.
            lifecycle:
              preStop:
                exec:
                  command:
                    - sh
                    - -c
                    - |
                      kill -TERM 1 2>/dev/null || true
                      sleep 5
            startupProbe:
              exec:
                command:
                  - sh
                  - -c
                  - |
                    docker --host=tcp://localhost:2376 \
                      --tlsverify \
                      --tlscacert=/certs/client/ca.pem \
                      --tlscert=/certs/client/cert.pem \
                      --tlskey=/certs/client/key.pem \
                      info >/dev/null
              periodSeconds: 2
              failureThreshold: 45
            volumeMounts:
              - name: docker-certs
                mountPath: /certs
              - name: runner-work
                mountPath: /home/runner/_work
        containers:
          - name: github-runner
            image: altinntjenestercontainerregistry.azurecr.io/altinn-studio/github-runner:latest
            imagePullPolicy: Always
            env:
              - name: DOCKER_HOST
                value: tcp://localhost:2376
              - name: DOCKER_TLS_VERIFY
                value: "1"
              - name: DOCKER_CERT_PATH
                value: /certs/client
              - name: GITHUB_API_URL
                value: https://api.github.com
              - name: GITHUB_HOST
                value: github.com
              - name: GITHUB_SERVER_URL
                value: https://github.com
              - name: GITHUB_OWNER
                value: Altinn
              - name: GITHUB_REPOSITORY
                value: altinn-studio
              - name: RUNNER_SCOPE
                value: repo
              - name: RUNNER_LABELS
                value: self-hosted
              - name: RUNNER_GROUP
                value: Default
              - name: RUNNER_WORKDIR
                value: /home/runner/_work
              - name: APP_ID
                valueFrom:
                  secretKeyRef:
                    name: github-runner-auth
                    key: appId
              - name: APP_INSTALLATION_ID
                valueFrom:
                  secretKeyRef:
                    name: github-runner-auth
                    key: installationId
              - name: APP_PRIVATE_KEY
                valueFrom:
                  secretKeyRef:
                    name: github-runner-auth
                    key: appPrivateKey
            resources:
              requests:
                cpu: "4"
                memory: 8Gi
                ephemeral-storage: 45Gi
              limits:
                cpu: "4"
                memory: 8Gi
                ephemeral-storage: 60Gi
            volumeMounts:
              - name: docker-certs
                mountPath: /certs
                readOnly: true
              - name: runner-work
                mountPath: /home/runner/_work
              - name: runner-temp
                mountPath: /home/runner/_work/_temp
              - name: runner-tmp
                mountPath: /tmp
        volumes:
          - name: docker-certs
            emptyDir: {}
          - name: runner-work
            emptyDir:
              sizeLimit: 20Gi
          - name: runner-temp
            emptyDir:
              medium: Memory
              sizeLimit: 2Gi
          - name: runner-tmp
            emptyDir:
              medium: Memory
              sizeLimit: 2Gi
        nodeSelector:
          purpose: github-runner
        tolerations:
          - key: purpose
            operator: Equal
            value: github-runner
            effect: NoSchedule
  triggers:
    - type: github-runner
      metadata:
        githubApiURL: https://api.github.com
        owner: Altinn
        runnerScope: repo
        repos: altinn-studio
        labels: self-hosted
        noDefaultLabels: "true"
        enableEtags: "false"
        applicationIDFromEnv: APP_ID
        installationIDFromEnv: APP_INSTALLATION_ID
        targetWorkflowQueueLength: "1"
      authenticationRef:
        name: github-runner-auth
