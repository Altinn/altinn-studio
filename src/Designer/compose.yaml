volumes:
  designer-git-data:
  gitea-git-data:
  gitea-avatars-data:
  gitea-attachments-data:
  keys:
  pgdata:
  pgadmindata:
  redisdata:

services:
  fake_ansattporten:
    container_name: fake-ansattporten
    image: fake-ansattporten:${COMMIT:-latest}
    build:
      context: ./development/fake-ansattporten
    ports:
      - '8443:8443'
    environment:
      - DEVELOP_BACKEND=${DEVELOP_BACKEND:-0}
      - ISSUER=http://fake-ansattporten:8443
      - BROWSER_BASE_URL=http://localhost:8443

  studio_azure_mock:
    image: studio-azure-mock:${COMMIT:-latest}
    container_name: studio-azure-mock
    build:
      context: ./development/azure-devops-mock
    ports:
      - '6161:6161'
    environment:
      - DESIGNER_HOST=studio-loadbalancer

  studio_loadbalancer:
    container_name: studio-loadbalancer
    image: studio-loadbalancer:${COMMIT:-latest}
    restart: always
    build:
      context: ./../load-balancer
    ports:
      - '80:80'
    entrypoint:
      - /bin/sh
      - -c
      - |
        # Remove k8s-specific config baked into the image
        rm -f /etc/nginx/extra-upstreams/* /etc/nginx/extra-locations/* /etc/nginx/extra-servers/* /etc/nginx/ssl/* /etc/nginx/logging/*
        if [ "$$DEVELOP_BACKEND" = "1" ]; then
          export DESIGNER_HOST="host.docker.internal:5000"
        fi
        [ "$$DEVELOP_DASHBOARD" = "1" ] && export DASHBOARD_HOST="host.docker.internal:2003"
        [ "$$DEVELOP_APP_DEVELOPMENT" = "1" ] && export EDITOR_HOST="host.docker.internal:2004"
        [ "$$DEVELOP_PREVIEW" = "1" ] && export PREVIEW_HOST="host.docker.internal:2005"
        [ "$$DEVELOP_ADMIN" = "1" ] && export ADMIN_HOST="host.docker.internal:2006"
        [ "$$DEVELOP_STUDIO_ROOT" = "1" ] && export INFO_HOST="host.docker.internal:2002"
        [ "$$DEVELOP_RESOURCE_ADMIN" = "1" ] && export RESOURCEADM_HOST="host.docker.internal:2023"
        exec /entrypoint.sh
    environment:
      - DEVELOP_APP_DEVELOPMENT=${DEVELOP_APP_DEVELOPMENT:-0}
      - DEVELOP_RESOURCE_ADMIN=${DEVELOP_RESOURCE_ADMIN:-0}
      - DEVELOP_ADMIN=${DEVELOP_ADMIN:-0}
      - DEVELOP_BACKEND=${DEVELOP_BACKEND:-0}
      - DEVELOP_DASHBOARD=${DEVELOP_DASHBOARD:-0}
      - DEVELOP_PREVIEW=${DEVELOP_PREVIEW:-0}
      - DEVELOP_STUDIO_ROOT=${DEVELOP_STUDIO_ROOT:-0}
      - DESIGNER_HOST=studio-designer:6000
      - DASHBOARD_HOST=studio-designer:6000
      - EDITOR_HOST=studio-designer:6000
      - PREVIEW_HOST=studio-designer:6000
      - ADMIN_HOST=studio-designer:6000
      - RESOURCEADM_HOST=studio-designer:6000
      - INFO_HOST=studio-designer:6000
      - REPOS_HOST=gitea-proxy:80
      - SERVER_NAME=studio.localhost
      - LISTEN_DIRECTIVE=80
    volumes:
      - ./../load-balancer/local/www:/www:ro
      - ./../load-balancer/local/error-pages:/etc/nginx/error-pages:ro
    depends_on:
      studio_repositories:
        condition: service_healthy
      studio_designer:
        condition: service_healthy
    extra_hosts:
      - 'host.docker.internal:host-gateway'

  studio_designer:
    container_name: studio-designer
    image: designer:${COMMIT:-latest}
    restart: always
    volumes:
      - 'designer-git-data:/AltinnCore/Repos'
      - 'keys:/mnt/keys'
    environment:
      - OTEL_SERVICE_NAME=studio-designer
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:6000
      - GeneralSettings:AltinnStudioEndpoint=http://studio.localhost/
      - GeneralSettings:AppLocation=Templates/AspNet/App
      - GeneralSettings:DeploymentLocation=/Templates/deployment
      - GeneralSettings:DeploymentLocation=Templates/AspNet/deployment
      - GeneralSettings:EnvironmentsUrl=http://studio-azure-mock:6161/environments.json
      - GeneralSettings:IntegrationTestsLocation=Templates/AspNet/App.IntegrationTests
      - GeneralSettings:LanguageFilesLocation=Languages/
      - GeneralSettings:TemplateLocation=/Templates
      - GeneralSettings:TemplateLocation=Templates/AspNet
      - PostgreSQLSettings:AdminConnectionString=Host=studio_db;Port=5432;Username=designer_admin;Password={0};Database=designerdb
      - PostgreSQLSettings:ConnectionString=Host=studio_db;Port=5432;Username=designer;Password={0};Database=designerdb
      - PostgreSQLSettings:DesignerDbAdminPwd=${POSTGRES_PASSWORD}
      - PostgreSQLSettings:DesignerDbPwd=designer
      - PostgreSQLSettings:EnableDBConnection=true
      - ServiceRepositorySettings:ApiEndPoint=http://gitea-proxy:81/api/v1/
      - ServiceRepositorySettings:ApiEndPointHost=gitea-proxy
      - ServiceRepositorySettings:GiteaLoginUrl=http://studio.localhost/repos/user/login
      - ServiceRepositorySettings:RepositoryBaseURL=http://gitea-proxy:81
      - ServiceRepositorySettings:RepositoryLocation=/AltinnCore/Repos/
      - TestdataRepositorySettings:RepositoryLocation=/Testdata
      - Integrations:AzureDevOpsSettings:BaseUri=http://studio-azure-mock:6161/_apis/
      - OidcLoginSettings:ClientId=${CLIENT_ID}
      - OidcLoginSettings:ClientSecret=${CLIENT_SECRET}
      - OidcLoginSettings:Authority=http://studio.localhost/repos/
      - OidcLoginSettings:RequireHttpsMetadata=false
      - OidcLoginSettings:CookieExpiryTimeInMinutes=59
      - OidcLoginSettings:FetchClientIdAndSecretFromRootEnvFile=false
      - StudioOidcLoginSettings:FetchClientIdAndSecretFromRootEnvFile=false
      - StudioOidcLoginSettings:ClientId=${STUDIO_OIDC_CLIENT_ID:-fake-client}
      - StudioOidcLoginSettings:ClientSecret=${STUDIO_OIDC_CLIENT_SECRET:-fake-secret}
      - StudioOidcLoginSettings:Authority=${STUDIO_OIDC_AUTHORITY:-http://fake-ansattporten:8443}
      - StudioOidcLoginSettings:RequireHttpsMetadata=false
      - FeatureManagement:Ansattporten=${FEATUREFLAGS_ANSATTPORTEN:-false}
      - FeatureManagement:GitOpsDeploy=${FEATUREFLAGS_GITOPSDEPLOY:-true}
      - FeatureManagement:StudioOidc=${FEATUREFLAGS_STUDIOOIDC:-true}
      - AnsattPortenLoginSettings:ClientId=${ANSATTPORTEN_CLIENTID:-}
      - AnsattPortenLoginSettings:ClientSecret=${ANSATTPORTEN_CLIENTSECRET:-}
      - RedisCacheSettings:UseRedisCache=true
      - RedisCacheSettings:ConnectionString=redis:6379
      - RedisCacheSettings:InstanceName=designer
      - SchedulingSettings:UsePersistentScheduling=true
      - SchedulingSettings:AddHostedService=true
      - GitOpsSettings:BotPersonalAccessToken=${GITOPS_BOT_PERSONAL_ACCESS_TOKEN:-}
      - GiteaDbSettings:ConnectionString=Host=studio_db;Port=5432;Username=gitea;Password=gitea;Database=giteadb
      - DeveloperMappingSettings:PidHashSalt=${PID_HASH_SALT:-local-dev-salt}
    ports:
      - '6000:6000'
    depends_on:
      studio_db:
        condition: service_healthy
      fake_ansattporten:
        condition: service_started
    build:
      context: ./../..
      dockerfile: src/Designer/Dockerfile
    extra_hosts:
      - 'host.docker.internal:host-gateway'
      - 'studio.localhost:host-gateway'
    healthcheck:
      test: [ "CMD", "curl", "--fail", "http://localhost:6000/health" ]
      interval: 5s
      timeout: 10s
      retries: 5

  gitea_proxy:
    container_name: gitea-proxy
    image: gitea-proxy:${COMMIT:-latest}
    restart: always
    build:
      context: ./../../src/gitea-proxy
    ports:
      - '3001:81'
    entrypoint:
      - /bin/sh
      - -c
      - |
        if [ "$$DEVELOP_BACKEND" = "1" ]; then
          export DESIGNER_HOST="host.docker.internal:5000"
        else
          export DESIGNER_HOST="studio-designer:6000"
        fi
        exec /entrypoint.sh
    environment:
      - DEVELOP_BACKEND=${DEVELOP_BACKEND:-0}
      - GITEA_HOST=studio-repositories:3000
      - STUDIO_OIDC_ENABLED=${FEATUREFLAGS_STUDIOOIDC:-true}
      - OTEL_ENDPOINT=localhost:4317
      - OTEL_SERVICE_NAME=gitea-proxy
      - OTEL_TRACE=off
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    depends_on:
      studio_repositories:
        condition: service_healthy
      studio_designer:
        condition: service_healthy

  studio_repositories:
    container_name: studio-repositories
    image: repositories:latest
    restart: always
    volumes:
      - 'gitea-git-data:/var/lib/gitea/git'
      - 'gitea-avatars-data:/var/lib/gitea/avatars'
      - 'gitea-attachments-data:/var/lib/gitea/attachments'
    environment:
      - GITEA____RUN_MODE=prod
      - GITEA__database__DB_TYPE=postgres
      - GITEA__database__HOST=studio_db:5432
      - GITEA__database__NAME=giteadb
      - GITEA__database__PASSWD=gitea
      - GITEA__database__USER=gitea
      - GITEA__designer__LFS_JWT_SECRET=MRlYoCcrcHmcKzUoQwaK6vKO3o4FPEJ74em5JnPRii0
      - GITEA__mailer__ENABLED=false
      - GITEA__mailer__ENABLE_NOTIFY_MAIL=false
      - GITEA__mailer__HOST=none
      - GITEA__mailer__REGISTER_EMAIL_CONFIRM=false
      - GITEA__mailer__SKIP_VERIFY=false
      - GITEA__security__INTERNAL_TOKEN=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJuYmYiOjE1MjMyNjM2NTR9.nxb5jknOl-LnVxOvyu0McHglWoixrfOD0mLZ8Druerw
      - GITEA__security__SECRET_KEY=VCOEYZOz3vPZrm1vGBOL6paxSePtLUHc85LsK7QIqbPHRcohw72p5K8EQQJ7YrgA
      - GITEA__server__DOMAIN=studio.localhost
      - GITEA__server__ROOT_URL=http://studio.localhost/repos
      - GITEA__server__SSH_DOMAIN=studio.localhost
      - GITEA__service__ENABLE_CAPTCHA=false
      - GITEA__service__ENABLE_REVERSE_PROXY_AUTHENTICATION=true
      - GITEA__service__ENABLE_REVERSE_PROXY_AUTHENTICATION_API=true
      - GITEA__service__ENABLE_REVERSE_PROXY_AUTO_REGISTRATION=true
      - GITEA__service__ENABLE_REVERSE_PROXY_FULL_NAME=true
      - GITEA__server__REVERSE_PROXY_AUTHENTICATION_USER=X-WEBAUTH-USER
      - GITEA__session__COOKIE_SECURE=false
      - GITEA__server__REVERSE_PROXY_TRUSTED_PROXIES=*
      - GITEA__service__USER_DISABLED_FEATURES=change_username
      - USER_GID=1000
      - USER_UID=1000
    ports:
      - '3000:3000'
      - '222:22'
    build:
      context: ./../gitea/
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    depends_on:
      studio_db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "--fail", "http://localhost:3000/api/healthz" ]
      interval: 5s
      timeout: 10s
      retries: 5

  studio_repositories_runner:
    container_name: gitea-runner
    restart: always
    depends_on:
      studio_repositories:
        condition: service_healthy
    build:
      context: ./../gitea-runner
    privileged: false
    environment:
      - GITEA_INSTANCE_URL=http://studio_repositories:3000
      - GITEA_RUNNER_REGISTRATION_TOKEN=${GITEA_RUNNER_REGISTRATION_TOKEN}
      - GITEA_RUNNER_EPHEMERAL=1
      - GITEA_RUNNER_ONCE=0
      - GITEA_RUNNER_LABELS=ubuntu-latest:host

  studio_db:
    container_name: studio-db
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: designer_admin
      POSTGRES_DB: designerdb
    ports:
      - '5432:5432'
    volumes:
      - ./development/db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U designer_admin -d designerdb" ]
      interval: 10s
      timeout: 5s
      retries: 5

  database_migrations:
    container_name: db-database_migrations
    depends_on:
      studio_db:
        condition: service_healthy
    build:
      context: ./backend
      dockerfile: Migrations.Dockerfile
    environment:
      - PGHOST=studio_db
      - PGPORT=5432
      - PGUSER=designer_admin
      - PGPASSWORD=${POSTGRES_PASSWORD}
      - PGDATABASE=designerdb

  pgadmin:
    image: dpage/pgadmin4
    ports:
      - "81:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-pgadmin4@pgadmin.org}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
       - pgadmindata:/var/lib/pgadmin
    extra_hosts:
      - 'host.docker.internal:host-gateway'

  redis:
    image: redis:alpine
    container_name: redis
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  redis-commander:
    container_name: redis-commander
    image: rediscommander/redis-commander:latest
    restart: always
    environment:
        - REDIS_HOSTS=redis
    ports:
        - "8081:8081"


