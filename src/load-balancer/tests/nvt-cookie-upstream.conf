events {}

http {
  server {
    listen 80;

    location / {
      add_header X-NVT-Upstream gateway always;
      add_header Set-Cookie "gateway=session; Path=/agents/; Secure; HttpOnly" always;
      add_header Set-Cookie "agent=session; Path=/agents/example/; Secure; HttpOnly" always;
      return 204;
    }
  }

  server {
    listen 81;

    location / {
      add_header X-NVT-Upstream designer always;
      add_header Set-Cookie "designer=session; Path=/designer/; Secure; HttpOnly" always;
      return 204;
    }
  }
}
