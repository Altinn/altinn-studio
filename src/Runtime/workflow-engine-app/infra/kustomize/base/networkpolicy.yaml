apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: workflow-engine-app-netpol
spec:
  podSelector:
    matchLabels:
      app: workflow-engine-app
  policyTypes:
    - Ingress
  ingress:
    # Allow traffic from app pods in the default namespace
    # Linkerd proxy port 4143 required when source pod has linkerd sidecar
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: default
      ports:
        - protocol: TCP
          port: 9090
        - protocol: TCP
          port: 4143
