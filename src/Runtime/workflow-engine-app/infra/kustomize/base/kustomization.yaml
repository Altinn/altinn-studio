apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - serviceaccount.yaml
  - service.yaml
  - deployment.yaml
  - networkpolicy.yaml
  - secrets.yaml
replacements:
  - source:
      kind: Deployment
      name: workflow-engine-app
      fieldPath: metadata.annotations.[altinn.studio/image]
    targets:
      - select:
          kind: Deployment
          name: workflow-engine-app
        fieldPaths:
          - spec.template.spec.containers.[name=workflow-engine-app].image
