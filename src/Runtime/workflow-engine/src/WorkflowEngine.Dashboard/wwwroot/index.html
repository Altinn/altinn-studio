<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Workflow Engine Dashboard</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="header">
  <h1>WORKFLOW ENGINE</h1>
  <div class="header-meters">
    <div class="meter">
      <span class="meter-label">Inbox</span>
      <div class="meter-bar"><div class="meter-fill low" id="meter-inbox" style="width:0%"></div><span class="meter-value" id="meter-inbox-val">0 / 0</span></div>
    </div>
    <div class="meter">
      <span class="meter-label">DB</span>
      <div class="meter-bar"><div class="meter-fill low" id="meter-db" style="width:0%"></div><span class="meter-value" id="meter-db-val">0 / 0</span></div>
    </div>
    <div class="meter">
      <span class="meter-label">HTTP</span>
      <div class="meter-bar"><div class="meter-fill low" id="meter-http" style="width:0%"></div><span class="meter-value" id="meter-http-val">0 / 0</span></div>
    </div>
  </div>
</div>

<div class="filter-bar">
  <span class="chip-label" id="label-org" style="display:none">Org</span>
  <div class="status-chips" id="org-chips"></div>
  <div class="chip-sep" id="sep-app" style="display:none"></div>
  <span class="chip-label" id="label-app" style="display:none">App</span>
  <div class="status-chips" id="app-chips"></div>
  <div class="chip-sep" id="sep-party" style="display:none"></div>
  <span class="chip-label" id="label-party" style="display:none">Party</span>
  <div class="status-chips" id="party-chips"></div>
  <div class="chip-sep" id="sep-guid" style="display:none"></div>
  <span class="chip-label" id="label-guid" style="display:none">Instance</span>
  <div class="status-chips" id="guid-chips"></div>
  <div class="filter-search">
    <input type="text" id="filter-input" placeholder="Search..." autocomplete="off" spellcheck="false">
    <button class="filter-clear" id="filter-clear" title="Clear filter">&times;</button>
  </div>
</div>

<div class="tab-bar">
  <div class="tab active" data-tab="live" onclick="switchTab('live')"><span class="sse-dot disconnected" id="sse-dot"></span>Live</div>
  <div class="tab" data-tab="history" onclick="switchTab('history')">History <button class="tab-reload" id="history-load" onclick="event.stopPropagation();loadHistory()" title="Reload"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.13-9.36L23 10"/></svg></button></div>
</div>

<div class="tab-panel active" id="panel-live">
  <div class="section collapsed" id="scheduled-section">
    <div class="section-title collapsible" onclick="toggleSection('scheduled-section')"><span class="chevron">&#9656;</span>SCHEDULED <span class="count" id="scheduled-count">0</span></div>
    <div class="section-body" id="scheduled-workflows"></div>
  </div>

  <div class="section" id="live-section">
    <div class="section-title collapsible" onclick="toggleSection('live-section')"><span class="chevron">&#9656;</span>INBOX <span class="count" id="live-count">0</span>
      <span class="section-chips" data-section="live" onclick="event.stopPropagation()">
        <button class="chip active" data-status="">All</button>
        <button class="chip" data-status="processing">Processing</button>
        <button class="chip" data-status="retrying">Retrying</button>
      </span>
      <svg class="engine-icon" id="engine-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" onclick="event.stopPropagation()" style="margin-left:auto"><title id="engine-icon-title">Stopped</title><path d="M12 15.5A3.5 3.5 0 0 1 8.5 12 3.5 3.5 0 0 1 12 8.5a3.5 3.5 0 0 1 3.5 3.5 3.5 3.5 0 0 1-3.5 3.5m7.43-2.53c.04-.32.07-.64.07-.97s-.03-.66-.07-1l2.11-1.63c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65A.49.49 0 0 0 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64L4.57 11c-.04.34-.07.67-.07 1s.03.65.07.97l-2.11 1.66c-.19.15-.25.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1.01c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.58 1.69-.98l2.49 1.01c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.66z"/></svg>
    </div>
    <div class="section-body">
      <div id="live-workflows"></div>
      <div class="empty-state" id="live-empty">No active workflows</div>
    </div>
  </div>

  <div class="section" id="recent-section">
    <div class="section-title collapsible" onclick="toggleSection('recent-section')" style="color:var(--text-dim);opacity:0.7"><span class="chevron">&#9656;</span>RECENT <span class="count" id="recent-count">0</span>
      <span class="section-chips" data-section="recent" onclick="event.stopPropagation()">
        <button class="chip active" data-status="">All</button>
        <button class="chip" data-status="completed">Completed</button>
        <button class="chip" data-status="failed">Failed</button>
      </span>
    </div>
    <div class="section-body" id="recent-workflows"></div>
  </div>
</div>

<div class="tab-panel" id="panel-history">
  <div class="section">
    <div class="section-title">HISTORY
      <span class="section-chips" data-section="history">
        <button class="chip active" data-status="">All</button>
        <button class="chip" data-status="completed">Completed</button>
        <button class="chip" data-status="failed">Failed</button>
        <button class="chip" data-status="retrying">Retrying</button>
      </span>
    </div>
    <div id="history-workflows"></div>
    <div class="empty-state" id="history-empty">Click Load to fetch history</div>
  </div>
</div>

<div class="modal-overlay" id="step-modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">Step Details</h2>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body" id="modal-body">
      <div class="modal-loading">Loading...</div>
    </div>
  </div>
</div>

<script src="/app.js"></script>
</body>
</html>
