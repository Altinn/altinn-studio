apiVersion: v1
kind: ConfigMap
metadata:
  name: apps-runtime-common-config
  namespace: default
data:
  runtime-common.json: |-
    {
      "ServiceRepositorySettings": {
        "BaseResourceFolderContainer": "/AltinnService/",
        "RepositoryLocation": "/AltinnService/"
      },
      "PlatformSettings": {
        "ApiPdf2Endpoint": "http://pdf-generator.pdf.svc.cluster.local/pdf",
        "ApiWorkflowEngineEndpoint": "http://workflow-engine-app.runtime-workflow-engine-app.svc.cluster.local/api/v1/"
      },
      "GeneralSettings": {
        "ExternalAppBaseUrl": "https://{org}.apps.{hostName}/{org}/{app}/"
      },
      "PdfGeneratorSettings": {
        "ServiceEndpointUri": "http://pdf-generator.pdf.svc.cluster.local/pdf"
      },
      "PlatformFrontendSettings": {
        "PostalCodesUrl": "https://altinncdn.no/postcodes/registry.json",
        "AltinnLogoUrl": "https://altinncdn.no/img/Altinn-logo-blue.svg",
        "HelpCircleIllustrationUrl": "https://altinncdn.no/img/illustration-help-circle.svg",
        "ArbeidsflateBaseUrl": "https://af.{hostName}/",
        "AccessManagementBaseUrl": "https://am.ui.{hostName}/"
      }
    }
---
apiVersion: v1
kind: Secret
metadata:
  name: apps-runtime-common-secrets
  namespace: default
type: Opaque
stringData:
  runtime-common-secrets.json: |-
    {
    }
