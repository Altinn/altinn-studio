apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: dis-tls-cert
  namespace: default
spec:
  provider:
    azurekv:
      # Authenticate with AKS workload identity via the ServiceAccount above,
      # so no secret/credential is stored in the cluster.
      authType: WorkloadIdentity
      vaultUrl: "${DIS_TLS_CERT_KV_URI}"
      tenantId: "${TENANT_ID}"
      serviceAccountRef:
        name: dis-tls-cert-kv-uami
