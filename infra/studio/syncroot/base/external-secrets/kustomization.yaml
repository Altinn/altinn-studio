apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Certificate resources for the External Secrets Operator. Applied by the
# `external-secrets-config` Flux Kustomization (see ../external-secrets.yaml),
# NOT included in the base kustomization.yaml, so it is only reconciled after
# the ESO CRDs are installed.
resources:
  - serviceaccount.yaml
  - secretstore.yaml
  - externalsecret.yaml
