apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ssl-key-secret
  namespace: default
spec:
  # Re-check the Key Vault hourly so renewed certificates roll out automatically.
  refreshInterval: 1h
  secretStoreRef:
    name: dis-tls-cert
    kind: SecretStore
  target:
    # Recreate the exact secret the altinn-loadbalancer (nginx) mounts:
    # keys star.altinn.studio.cert / star.altinn.studio.key at
    # /etc/nginx/ssl/altinn_studio/ (see src/load-balancer/k8s/ssl/ssl.conf).
    name: ssl-key-secret
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    - secretKey: star.altinn.studio.cert
      remoteRef:
        key: ${DIS_TLS_CERT_SECRET_NAME_CRT}
    - secretKey: star.altinn.studio.key
      remoteRef:
        key: ${DIS_TLS_CERT_SECRET_NAME_KEY}
