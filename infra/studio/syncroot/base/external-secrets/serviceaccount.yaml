apiVersion: v1
kind: ServiceAccount
metadata:
  name: dis-tls-cert-kv-uami
  namespace: default
  labels:
    azure.workload.identity/use: "true"
  annotations:
    # Client id of the per-environment identity created in altinn-studio-infra
    # (dis-tls-cert-kv-<env>). Federated to this ServiceAccount
    # (system:serviceaccount:default:dis-tls-cert-kv-uami).
    azure.workload.identity/client-id: "${ESO_DIS_TLS_CERT_CLIENT_ID}"
