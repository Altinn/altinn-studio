---
# HelmRepository + HelmRelease live in `default` (the outer syncroot's
# targetNamespace) because the keda namespace doesn't exist yet — the
# chart's install creates it via install.createNamespace below. The chart
# still installs INTO `keda` via spec.targetNamespace; only the Flux source
# and release plumbing live in default.
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: keda
  namespace: default
spec:
  type: oci
  interval: 1h
  url: oci://ghcr.io/kedacore/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keda
  namespace: default
spec:
  interval: 10m
  timeout: 5m
  releaseName: keda
  targetNamespace: keda
  install:
    # Helm creates the keda namespace at install time so the operator
    # resources (Deployments, Services, ConfigMaps...) have somewhere to land.
    createNamespace: true
    remediation:
      retries: 5
  upgrade:
    remediation:
      retries: 5
  chart:
    spec:
      chart: keda
      version: 2.19.0
      sourceRef:
        kind: HelmRepository
        name: keda
        namespace: default
  values:
    # KEDA's defaults are sensible. Keep this block intentionally small;
    # any per-environment knobs (e.g. higher resource limits in prod) can
    # be added later via Flux postBuild substitution or per-env overlays.
    resources:
      operator:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          memory: 1Gi
      metricServer:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          memory: 1Gi
