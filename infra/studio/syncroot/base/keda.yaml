---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: keda
  namespace: keda
spec:
  type: oci
  interval: 1h
  url: oci://ghcr.io/kedacore/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keda
  namespace: keda
spec:
  interval: 10m
  timeout: 5m
  releaseName: keda
  targetNamespace: keda
  install:
    # The keda namespace is created by Helm at install time. This avoids
    # the kustomize/Flux namespace transformation that would otherwise
    # rename a sibling Namespace resource in the syncroot to "default"
    # and conflict with any other Namespace resource at the same level.
    createNamespace: true
    remediation:
      retries: 5
  upgrade:
    remediation:
      retries: 5
  chart:
    spec:
      chart: keda
      version: 2.19.0
      sourceRef:
        kind: HelmRepository
        name: keda
        namespace: keda
  values:
    # KEDA's defaults are sensible. Keep this block intentionally small;
    # any per-environment knobs (e.g. higher resource limits in prod) can
    # be added later via Flux postBuild substitution or per-env overlays.
    resources:
      operator:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          memory: 1Gi
      metricServer:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          memory: 1Gi
