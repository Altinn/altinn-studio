---
# External Secrets Operator (ESO).
#
# ESO keeps the `ssl-key-secret` TLS certificate secret in sync with the
# platform-owned `dis-tls-cert` Key Vault, replacing the old flow where the
# infra pipeline downloaded the certificate and Terraform installed it as a
# static Kubernetes secret. Certificate renewals in the Key Vault now propagate
# to the cluster automatically.
#
# The operator install (HelmRepository + HelmRelease) follows the same pattern
# as keda.yaml. The certificate resources (ServiceAccount + SecretStore +
# ExternalSecret) depend on the CRDs this chart installs, so they live in a
# separate, self-healing Flux Kustomization (`external-secrets-config`, below)
# instead of directly in the syncroot. That isolates the "CRD not yet installed"
# race to its own Kustomization and keeps the top-level studio-syncroot healthy.
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: external-secrets
  namespace: default
spec:
  # Canonical HTTPS Helm repo (same rationale as keda: the OCI/ghcr variant can
  # 403 on anonymous pulls).
  interval: 1h
  url: https://charts.external-secrets.io
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets
  namespace: default
spec:
  interval: 10m
  timeout: 5m
  releaseName: external-secrets
  targetNamespace: external-secrets
  install:
    createNamespace: true
    crds: Create
    remediation:
      retries: 5
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 5
  chart:
    spec:
      chart: external-secrets
      version: 2.7.0
      sourceRef:
        kind: HelmRepository
        name: external-secrets
        namespace: default
  values:
    # CRDs are managed by Flux (crds: Create/CreateReplace above); let the chart
    # install them so the SecretStore/ExternalSecret kinds exist.
    installCRDs: true
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 256Mi
    webhook:
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          memory: 128Mi
    certController:
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          memory: 128Mi
---
# Certificate resources, applied only once the ESO CRDs exist. This Kustomization
# reuses the studio-syncroot OCI source and points at the ./base/external-secrets
# folder. It retries on its own until the CRDs are available, so it never blocks
# the top-level syncroot.
#
# The substitution values are resolved by the top-level studio-syncroot
# Kustomization (defined in the altinn-studio-infra Terraform) when it renders
# this file — mirroring how runner-org-sync threads its client id.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-secrets-config
  namespace: default
spec:
  interval: 5m
  retryInterval: 1m
  targetNamespace: default
  sourceRef:
    kind: OCIRepository
    name: studio-syncroot
    namespace: default
  path: ./base/external-secrets
  prune: true
  wait: true
  timeout: 2m
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: external-secrets
      namespace: default
  postBuild:
    substitute:
      TENANT_ID: ${TENANT_ID}
      ESO_DIS_TLS_CERT_CLIENT_ID: ${ESO_DIS_TLS_CERT_CLIENT_ID}
      DIS_TLS_CERT_KV_URI: ${DIS_TLS_CERT_KV_URI}
      DIS_TLS_CERT_SECRET_NAME_CRT: ${DIS_TLS_CERT_SECRET_NAME_CRT}
      DIS_TLS_CERT_SECRET_NAME_KEY: ${DIS_TLS_CERT_SECRET_NAME_KEY}
