---
# External Secrets Operator (ESO).
#
# Keeps the `ssl-key-secret` TLS certificate in sync with the platform-owned
# `dis-tls-cert` Key Vault, replacing the old flow where the infra pipeline
# downloaded the certificate and Terraform installed it as a static secret.
#
# Syncroot only references the OCI config artifact (published by
# .github/workflows/deploy-studio-external-secrets.yaml from
# infra/studio/external-secrets/), matching the otel-operator pattern. The
# artifact holds two overlays:
#   ./operator - ESO Helm install (namespace + HelmRepository + HelmRelease)
#   ./config   - ServiceAccount + SecretStore + ExternalSecret
# The config Kustomization dependsOn the operator so it only applies once ESO's
# CRDs are installed and healthy.
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: external-secrets
  namespace: default
spec:
  interval: 5m
  url: oci://altinntjenestercontainerregistry.azurecr.io/altinn-studio/configs/external-secrets-repo
  ref:
    tag: ${ENVIRONMENT}
  provider: azure
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-secrets-operator
  namespace: default
spec:
  interval: 5m
  retryInterval: 1m
  targetNamespace: external-secrets
  sourceRef:
    kind: OCIRepository
    name: external-secrets
    namespace: default
  path: ./operator
  prune: true
  wait: true
  timeout: 5m
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: external-secrets
      namespace: external-secrets
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-secrets-config
  namespace: default
spec:
  interval: 5m
  retryInterval: 1m
  targetNamespace: default
  dependsOn:
    - name: external-secrets-operator
  sourceRef:
    kind: OCIRepository
    name: external-secrets
    namespace: default
  path: ./config
  prune: true
  wait: true
  timeout: 2m
  # Values resolved by the top-level studio-syncroot Kustomization (defined in
  # altinn-studio-infra Terraform), same mechanism as runner-org-sync.
  postBuild:
    substitute:
      TENANT_ID: ${TENANT_ID}
      ESO_DIS_TLS_CERT_CLIENT_ID: ${ESO_DIS_TLS_CERT_CLIENT_ID}
      DIS_TLS_CERT_KV_URI: ${DIS_TLS_CERT_KV_URI}
      DIS_TLS_CERT_SECRET_NAME_CRT: ${DIS_TLS_CERT_SECRET_NAME_CRT}
      DIS_TLS_CERT_SECRET_NAME_KEY: ${DIS_TLS_CERT_SECRET_NAME_KEY}
