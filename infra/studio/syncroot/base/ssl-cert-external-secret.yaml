apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: studio-ssl-cert
  namespace: default
spec:
  interval: 5m
  url: oci://altinntjenestercontainerregistry.azurecr.io/altinn-studio/configs/studio-ssl-cert-repo
  ref:
    tag: ${ENVIRONMENT}
  provider: azure
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: studio-ssl-cert
  namespace: default
spec:
  interval: 5m
  targetNamespace: default
  sourceRef:
    kind: OCIRepository
    name: studio-ssl-cert
    namespace: default
  path: ./
  prune: true
  timeout: 1m
  postBuild:
    substitute:
      TENANT_ID: ${TENANT_ID}
      ESO_DIS_TLS_CERT_CLIENT_ID: ${ESO_DIS_TLS_CERT_CLIENT_ID}
      DIS_TLS_CERT_KV_URI: ${DIS_TLS_CERT_KV_URI}
      DIS_TLS_CERT_SECRET_NAME_CRT: ${DIS_TLS_CERT_SECRET_NAME_CRT}
      DIS_TLS_CERT_SECRET_NAME_KEY: ${DIS_TLS_CERT_SECRET_NAME_KEY}
