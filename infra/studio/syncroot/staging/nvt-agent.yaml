apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: nvt-agent-config
  namespace: default
spec:
  interval: 5m
  provider: azure
  ref:
    tag: staging
  url: oci://altinntjenestercontainerregistry.azurecr.io/altinn-studio/configs/nvt-agent
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: nvt-agent-config
  namespace: default
spec:
  interval: 5m
  path: ./bootstrap
  postBuild:
    substitute:
      ESO_STUDIO_KV_CLIENT_ID: ${ESO_STUDIO_KV_CLIENT_ID}
      STUDIO_KV_URI: ${STUDIO_KV_URI}
      TENANT_ID: ${TENANT_ID}
  prune: true
  sourceRef:
    kind: OCIRepository
    name: nvt-agent-config
    namespace: default
  timeout: 15m
  wait: true
