apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: nvt-secrets
  namespace: default
spec:
  dependsOn:
    - name: nvt-platform
  healthChecks:
    - apiVersion: external-secrets.io/v1
      kind: ExternalSecret
      name: nvt-broker-env
      namespace: nvt
    - apiVersion: external-secrets.io/v1
      kind: ExternalSecret
      name: nvt-broker-seed
      namespace: nvt
    - apiVersion: external-secrets.io/v1
      kind: ExternalSecret
      name: nvt-gateway-github
      namespace: nvt
    - apiVersion: external-secrets.io/v1
      kind: ExternalSecret
      name: nvt-gateway-session
      namespace: nvt
    - apiVersion: external-secrets.io/v1
      kind: ExternalSecret
      name: nvt-github-app
      namespace: nvt
  interval: 5m
  path: ./secrets
  postBuild:
    substitute:
      ESO_STUDIO_KV_CLIENT_ID: ${ESO_STUDIO_KV_CLIENT_ID}
      STUDIO_KV_URI: ${STUDIO_KV_URI}
      TENANT_ID: ${TENANT_ID}
    substituteFrom:
      - kind: ConfigMap
        name: nvt-deployment-metadata
  prune: true
  sourceRef:
    kind: OCIRepository
    name: nvt-agent-config
    namespace: default
  timeout: 5m
  wait: true
