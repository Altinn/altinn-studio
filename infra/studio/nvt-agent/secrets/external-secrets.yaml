apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: nvt-broker-seed
  namespace: nvt
spec:
  data:
    - remoteRef:
        key: nvt-codex-mirkosekulic-credentials
      secretKey: codex-mirkosekulic.json
    - remoteRef:
        key: nvt-claude-jondyr-credentials
      secretKey: claude-jondyr.json
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: studio-key-vault
  target:
    creationPolicy: Owner
    deletionPolicy: Delete
    name: nvt-broker-seed
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: nvt-github-app
  namespace: nvt
spec:
  data:
    - remoteRef:
        key: nvt-agent-altinn-private-key-pem
      secretKey: private-key.pem
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: studio-key-vault
  target:
    creationPolicy: Owner
    deletionPolicy: Delete
    name: nvt-github-app
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: nvt-broker-env
  namespace: nvt
spec:
  data:
    - remoteRef:
        key: nvt-agent-private-key-pem
      secretKey: forkPrivateKeyPem
    - remoteRef:
        key: nvt-agent-altinn-private-key-pem
      secretKey: altinnPrivateKeyPem
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: studio-key-vault
  target:
    creationPolicy: Owner
    deletionPolicy: Delete
    name: nvt-broker-env
    template:
      engineVersion: v2
      data:
        NVT_ALTINN_GITHUB_APP_ID: '{{ printf "%s" "${NVT_ALTINN_GITHUB_APP_ID}" }}'
        NVT_ALTINN_GITHUB_APP_INSTALLATION_ID: '{{ printf "%s" "${NVT_ALTINN_GITHUB_APP_INSTALLATION_ID}" }}'
        NVT_ALTINN_GITHUB_APP_PRIVATE_KEY_BASE64: "{{ .altinnPrivateKeyPem | b64enc }}"
        NVT_FORK_GITHUB_APP_ID: '{{ printf "%s" "${NVT_FORK_GITHUB_APP_ID}" }}'
        NVT_FORK_GITHUB_APP_INSTALLATION_ID: '{{ printf "%s" "${NVT_FORK_GITHUB_APP_INSTALLATION_ID}" }}'
        NVT_FORK_GITHUB_APP_PRIVATE_KEY_BASE64: "{{ .forkPrivateKeyPem | b64enc }}"
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: nvt-gateway-github
  namespace: nvt
spec:
  data:
    - remoteRef:
        key: nvt-agent-gateway-oauth-client-secret
      secretKey: client-secret
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: studio-key-vault
  target:
    creationPolicy: Owner
    deletionPolicy: Delete
    name: nvt-gateway-github
    template:
      engineVersion: v2
      data:
        client-id: '{{ printf "%s" "${NVT_GATEWAY_GITHUB_CLIENT_ID}" }}'
        client-secret: "{{ index . \"client-secret\" }}"
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: nvt-gateway-session
  namespace: nvt
spec:
  data:
    - remoteRef:
        key: nvt-gateway-session-secret
      secretKey: session-secret
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: studio-key-vault
  target:
    creationPolicy: Owner
    deletionPolicy: Delete
    name: nvt-gateway-session
