apiVersion: v1
kind: Service
metadata:
  name: altinn-repositories
  labels:
    run: altinn-repositories
spec:
  ports:
    - port: {{ .Values.proxy.service.internalPort }}
      targetPort: 81
      protocol: TCP
  selector:
    run: altinn-repositories
---
apiVersion: v1
kind: Service
metadata:
  name: altinn-repositories-public
  labels:
    run: altinn-repositories
spec:
  ports:
    - port: {{ .Values.proxy.service.publicPort }}
      targetPort: 80
      protocol: TCP
  selector:
    run: altinn-repositories
