{{- $hasIngressRoute := eq (include "kuberneteswrapper.hasIngressRoute" .) "true" }}
{{- if $hasIngressRoute }}
{{- $ingressRoute := .Values.ingressRoute | default dict }}
{{- $routes := $ingressRoute.routes | default (list) }}
{{- $entryPoints := $ingressRoute.entryPoints | default (list "http" "https") }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ required "ingressRoute.name is required when ingressRoute.routes is set" $ingressRoute.name }}
spec:
  entryPoints:
  {{- range $entryPoint := $entryPoints }}
  - {{ $entryPoint }}
  {{- end }}
  routes:
  {{- range $route := $routes }}
  - match: {{ required "ingressRoute.routes[].match is required" $route.match | quote }}
    kind: {{ required "ingressRoute.routes[].kind is required" $route.kind }}
    {{- if $route.priority }}
    priority: {{ $route.priority }}
    {{- end }}
    services:
    {{- $services := default (list) $route.services }}
    {{- if eq (len $services) 0 }}
    {{- fail "ingressRoute.routes[].services must contain at least one service" }}
    {{- end }}
    {{- range $service := $services }}
    - name: {{ required "ingressRoute.routes[].services[].name is required" $service.name }}
      port: {{ required "ingressRoute.routes[].services[].port is required" $service.port }}
    {{- end }}
    {{- if $route.middlewares }}
    middlewares:
    {{- range $middleware := $route.middlewares }}
      - name: {{ required "ingressRoute.routes[].middlewares[].name is required when middlewares are set" $middleware.name }}
    {{- end }}
    {{- end }}
  {{- end }}
  {{- $tls := $ingressRoute.tls }}
  {{- if $tls }}
  tls:
    {{- if $tls.secretName }}
    secretName: {{ $tls.secretName }}
    {{- end }}
  {{- end }}
{{- end }}
