replicaCount: 1

environment: development

image:
  repository: altinntjenestercontainerregistry.azurecr.io/altinn-loadbalancer
  tag: latest
  pullPolicy: IfNotPresent
  containerPorts:
    http: 80
    https: 443
    lhci: 9001

hosts:
  dev: dev.altinn.studio
  staging: staging.altinn.studio
  prod: altinn.studio

env:
  DESIGNER_HOST: altinn-designer:3000
  DASHBOARD_HOST: altinn-designer:3000
  EDITOR_HOST: altinn-designer:3000
  PREVIEW_HOST: altinn-designer:3000
  ADMIN_HOST: altinn-designer:3000
  RESOURCEADM_HOST: altinn-designer:3000
  INFO_HOST: altinn-designer:3000
  REPOS_HOST: altinn-repositories-public
  LISTEN_DIRECTIVE: "443 ssl http2"
  OTEL_ENDPOINT: localhost:4317
  OTEL_SERVICE_NAME: studio-loadbalancer
  OTEL_TRACE: "on"

volumeMounts:
  - name: altinn-loadbalancer-ssl
    mountPath: "/etc/nginx/ssl/altinn_studio"

volumes:
  - name: altinn-loadbalancer-ssl
    secret:
      secretName: ssl-key-secret
  - name: nginx-exporter-config
    configMap:
      name: nginx-exporter-config

service:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
    - port: 443
      targetPort: 443
      protocol: TCP
      name: https
    - port: 9001
      targetPort: 9001
      protocol: TCP
      name: lhci

# insert correct ip
loadbalancerIP:
  dev: 51.136.127.155
  staging: 52.157.218.253
  prod: 20.50.249.144

sidecar:
  enabled: true
  name: "exporter"
  image: "ghcr.io/martin-helmich/prometheus-nginxlog-exporter/exporter@sha256:62987d855bb07edc5d126b926751c733e6683a6a6d2844026d3af332bac654be"
  args:
    - "-config-file"
    - "/etc/prometheus-nginxlog-exporter/config.hcl"
  ports:
    - containerPort: 4040
      name: metrics
      protocol: TCP
  volumeMounts:
    - name: nginx-exporter-config
      mountPath: /etc/prometheus-nginxlog-exporter
