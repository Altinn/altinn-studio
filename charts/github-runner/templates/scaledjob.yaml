apiVersion: keda.sh/v1alpha1
kind: ScaledJob
metadata:
  name: {{ include "github-runner.fullname" . }}
  labels:
    {{- include "github-runner.labels" . | nindent 4 }}
spec:
  maxReplicaCount: {{ .Values.keda.maxReplicaCount }}
  minReplicaCount: {{ .Values.keda.minReplicaCount }}
  pollingInterval: {{ .Values.keda.pollingInterval }}
  successfulJobsHistoryLimit: {{ .Values.keda.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.keda.failedJobsHistoryLimit }}
  jobTargetRef:
    backoffLimit: 0
    ttlSecondsAfterFinished: {{ .Values.keda.ttlSecondsAfterFinished }}
    activeDeadlineSeconds: {{ .Values.keda.activeDeadlineSeconds }}
    template:
      metadata:
        labels:
          {{- include "github-runner.labels" . | nindent 10 }}
          {{- with .Values.podLabels }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
        {{- with .Values.podAnnotations }}
        annotations:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      spec:
        {{- with .Values.runtimeClassName }}
        runtimeClassName: {{ . }}
        {{- end }}
        restartPolicy: Never
        {{- with .Values.imagePullSecrets }}
        imagePullSecrets:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .Values.podSecurityContext }}
        securityContext:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- if .Values.dockerInDocker.enabled }}
        initContainers:
          - name: dockerd
            image: "{{ .Values.dockerInDocker.image.repository }}:{{ .Values.dockerInDocker.image.tag }}"
            imagePullPolicy: {{ .Values.dockerInDocker.image.pullPolicy }}
            restartPolicy: Always
            securityContext:
              privileged: true
            env:
              - name: DOCKER_TLS_CERTDIR
                value: "/certs"
            command: ["sh", "-c"]
            args:
              - |
                if [ "$(df -PT /var/lib/docker | awk 'NR==2 {print $2}')" = "virtiofs" ]; then
                  apk add --no-cache e2fsprogs &&
                  truncate -s {{ .Values.dockerInDocker.diskSize | default "30G" }} /tmp/docker-disk.img &&
                  mkfs.ext4 -F /tmp/docker-disk.img &&
                  mount /tmp/docker-disk.img /var/lib/docker
                fi
                exec dockerd-entrypoint.sh --host=tcp://0.0.0.0:2376
            startupProbe:
              tcpSocket:
                port: 2376
              periodSeconds: 2
              failureThreshold: 45
            volumeMounts:
              - name: docker-certs
                mountPath: /certs
              {{- if .Values.shareWorkspace.enabled }}
              - name: runner-work
                mountPath: {{ .Values.shareWorkspace.path | quote }}
              {{- end }}
        {{- end }}
        containers:
          - name: {{ .Chart.Name }}
            {{- with .Values.securityContext }}
            securityContext:
              {{- toYaml . | nindent 14 }}
            {{- end }}
            image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
            imagePullPolicy: {{ .Values.image.pullPolicy }}
            env:
              {{- if .Values.dockerInDocker.enabled }}
              - name: DOCKER_HOST
                value: "tcp://localhost:2376"
              - name: DOCKER_TLS_VERIFY
                value: "1"
              - name: DOCKER_CERT_PATH
                value: "/certs/client"
              {{- end }}
              - name: GITHUB_API_URL
                value: {{ .Values.github.apiUrl | quote }}
              - name: GITHUB_HOST
                value: {{ .Values.github.host | quote }}
              - name: GITHUB_SERVER_URL
                value: {{ .Values.github.serverUrl | quote }}
              - name: GITHUB_OWNER
                value: {{ .Values.github.owner | quote }}
              - name: GITHUB_REPOSITORY
                value: {{ .Values.github.repository | quote }}
              - name: RUNNER_SCOPE
                value: {{ .Values.github.runnerScope | quote }}
              - name: RUNNER_LABELS
                value: {{ .Values.github.runnerLabels | quote }}
              - name: RUNNER_GROUP
                value: {{ .Values.github.runnerGroup | quote }}
              - name: RUNNER_WORKDIR
                value: {{ .Values.shareWorkspace.path | quote }}
              - name: APP_ID
                value: {{ .Values.github.appId | quote }}
              - name: APP_PRIVATE_KEY
                valueFrom:
                  secretKeyRef:
                    name: {{ .Values.auth.secretName }}
                    key: {{ .Values.auth.appPrivateKeyKey }}
              {{- with .Values.extraEnv }}
              {{- toYaml . | nindent 14 }}
              {{- end }}
            {{- with .Values.resources }}
            resources:
              {{- toYaml . | nindent 14 }}
            {{- end }}
            {{- if or .Values.volumeMounts .Values.dockerInDocker.enabled .Values.shareWorkspace.enabled }}
            volumeMounts:
              {{- with .Values.volumeMounts }}
              {{- toYaml . | nindent 14 }}
              {{- end }}
              {{- if .Values.dockerInDocker.enabled }}
              - name: docker-certs
                mountPath: /certs
                readOnly: true
              {{- end }}
              {{- if .Values.shareWorkspace.enabled }}
              - name: runner-work
                mountPath: {{ .Values.shareWorkspace.path | quote }}
              {{- end }}
            {{- end }}
        {{- if or .Values.volumes .Values.dockerInDocker.enabled .Values.shareWorkspace.enabled }}
        volumes:
          {{- with .Values.volumes }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
          {{- if .Values.dockerInDocker.enabled }}
          - name: docker-certs
            emptyDir: {}
          {{- end }}
          {{- if .Values.shareWorkspace.enabled }}
          - name: runner-work
            emptyDir:
              sizeLimit: {{ .Values.shareWorkspace.sizeLimit | quote }}
          {{- end }}
        {{- end }}
        {{- with .Values.nodeSelector }}
        nodeSelector:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .Values.affinity }}
        affinity:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .Values.tolerations }}
        tolerations:
          {{- toYaml . | nindent 10 }}
        {{- end }}
  triggers:
    - type: github-runner
      metadata:
        githubApiURL: {{ .Values.github.apiUrl | quote }}
        owner: {{ .Values.github.owner | quote }}
        runnerScope: {{ .Values.github.runnerScope | quote }}
        repos: {{ .Values.github.repository | quote }}
        labels: {{ .Values.github.scalerLabels | quote }}
        noDefaultLabels: {{ .Values.github.noDefaultLabels | quote }}
        enableEtags: {{ .Values.github.enableEtags | quote }}
        applicationID: {{ .Values.github.appId | quote }}
        installationID: {{ .Values.github.installationId | quote }}
        targetWorkflowQueueLength: {{ .Values.keda.targetWorkflowQueueLength | quote }}
      authenticationRef:
        name: {{ .Values.keda.authenticationRef.name }}
