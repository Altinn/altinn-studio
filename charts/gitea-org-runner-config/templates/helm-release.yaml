---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: {{ .Values.releaseName }}
  namespace: studio-runners
spec:
  releaseName: {{ .Values.releaseName }}
  targetNamespace: studio-runners
  interval: 5m
  install:
    remediation:
      retries: 1
  upgrade:
    remediation:
      retries: 1
  chart:
    spec:
      version: "{{ .Values.chartVersion }}"
      chart: gitea-org-runner
      sourceRef:
        kind: HelmRepository
        name: studio-charts
        namespace: default
  values:
    image:
      tag: "{{ .Values.imageTag }}"
    nameOverride: {{ .Values.releaseName }}
    fullnameOverride: {{ .Values.releaseName }}
    runtimeClassName: {{ .Values.runtimeClassName | quote }}
    dockerInDocker:
      enabled: {{ .Values.dockerInDocker.enabled }}
    shareWorkspace:
      enabled: {{ .Values.shareWorkspace.enabled }}

    # Chart-level Gitea config: the workload chart synthesises each runner
    # pod's GITEA_INSTANCE_URL / RUNNER_LABELS env vars from here. The KEDA
    # github-runner scaler uses apiUrl to poll org queue depth.
    gitea:
      instanceUrl: "{{ .Values.giteaInstanceUrl }}"
      apiUrl: "{{ .Values.giteaInstanceUrl }}/api/v1"
      runnerLabels: "ubuntu-latest:host"

    # KEDA wiring: name of the TriggerAuthentication ScaledJobs reference.
    # The CR is materialised by runner-org-sync's deploy in the same
    # namespace (src/runner-org-sync/infra/kustomize/triggerauthentication.yaml).
    keda:
      authenticationRef:
        name: keda-gitea-auth

    # Per-org concurrency caps. Default applies to every org; overrides
    # keyed by org name take precedence.
    maxConcurrentDefault: {{ .Values.maxConcurrentDefault | default 2 }}
    maxConcurrentOverrides:
      {{- toYaml (.Values.maxConcurrentOverrides | default dict) | nindent 6 }}

    resources:
      requests:
        cpu: 500m
        memory: 2Gi
        ephemeral-storage: 16Gi
      limits:
        cpu: "2"
        memory: 2Gi
        ephemeral-storage: 20Gi

    # Slim per-org list. The workload chart pairs each entry's `name` with
    # chart-level gitea/keda config to render a ScaledJob, and mounts
    # `registrationTokenSecretName` via secretKeyRef on the runner pod.
    # No per-runner environmentVariables block needed; no `replicas`
    # (KEDA owns scaling via maxConcurrent*).
    runners:
    {{- range index .Values.runners .Values.environment }}
    - name: {{ .name }}
      registrationTokenSecretName: {{ .registrationTokenSecretName }}
    {{- end }}

    tolerations:
      - key: "purpose"
        operator: "Equal"
        value: "runner"
        effect: "NoSchedule"
    nodeSelector:
      purpose: runner
