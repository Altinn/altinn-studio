{{- range .Values.runners }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gitea-org-runner.fullname" $ }}-{{ .name }}
  labels:
    {{- include "gitea-org-runner.labels" $ | nindent 4 }}
    runner: {{ .name }}
spec:
  replicas: {{ .replicas | default 1 }}
  selector:
    matchLabels:
      {{- include "gitea-org-runner.selectorLabels" $ | nindent 6 }}
      runner: {{ .name }}
  template:
    metadata:
      {{- with $.Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "gitea-org-runner.labels" $ | nindent 8 }}
        runner: {{ .name }}
        {{- with $.Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with $.Values.runtimeClassName }}
      runtimeClassName: {{ . }}
      {{- end }}
      {{- with $.Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if $.Values.dockerInDocker.enabled }}
      initContainers:
        - name: dockerd
          image: "{{ $.Values.dockerInDocker.image.repository }}:{{ $.Values.dockerInDocker.image.tag }}"
          imagePullPolicy: {{ $.Values.dockerInDocker.image.pullPolicy }}
          restartPolicy: Always
          securityContext:
            privileged: true
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          args:
            - "--host=tcp://0.0.0.0:2375"
          startupProbe:
            tcpSocket:
              port: 2375
            periodSeconds: 2
            failureThreshold: 30
          volumeMounts:
            - name: docker-lib
              mountPath: /var/lib/docker
      {{- end }}
      containers:
        - name: {{ $.Chart.Name }}
          {{- with $.Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ $.Values.image.repository }}:{{ $.Values.image.tag | default $.Chart.AppVersion }}"
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          env:
            {{- if $.Values.dockerInDocker.enabled }}
            - name: DOCKER_HOST
              value: "tcp://localhost:2375"
            {{- end }}
            {{- if .environmentVariables }}
            {{- range $variable := .environmentVariables}}
            - name: {{ $variable.name }}
              {{- if $variable.value }}
              value: {{ $variable.value | quote }}
              {{- end }}
              {{- if $variable.valueFrom }}
              valueFrom:
                secretKeyRef:
                  name: {{ $variable.valueFrom.secretKeyRef.name }}
                  key: {{ $variable.valueFrom.secretKeyRef.key }}
              {{- end }}
            {{- end }}
            {{- end }}

          {{- with $.Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $.Values.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- if or $.Values.volumes $.Values.dockerInDocker.enabled }}
      volumes:
        {{- with $.Values.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if $.Values.dockerInDocker.enabled }}
        - name: docker-lib
          emptyDir: {}
        {{- end }}
      {{- end }}
      {{- with $.Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
